<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>🛒 SHOP — ซื้อการ์ด</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/game.css" />
  <link rel="stylesheet" href="../css/theme.css" />
  </head>
<body>
  <header class="topbar">
    <h1>🛒 Shop</h1>
    <div class="right-group">
      <div class="money-box" id="moneyWindow">💰 0</div>
      <button class="back-btn" onclick="goBack()">🔙 กลับ</button>
    </div>
  </header>
  <div class="mode-buttons">
  <a href="game.html"><button>🎴 NORMAL</button></a>
  <a href="inf.html"><button>🌀 INF_MODE</button></a>
  <a href="boss.html"><button>👹 BOSS</button></a>
  <a href="upgrade.html"><button>🌟 UPGRADE</button></a>
  <a href="upgradeskills.html"><button>💪 SKILLS</button></a>
  <a href="GACHA.html"><button>🔮 GACHA</button></a>
  <a href="GACHAE.html"><button>👔 EQUIPMENT</button></a>
</div>
<div id="refresh-timer" class="footer-note"></div>
  <div class="panel">
    <div class="searchbar">
      <input id="q" type="text" placeholder="ค้นหาชื่อการ์ด..." />
      <select id="rarFilter">
        <option value="">ทุกความแรร์</option>
        <option>Common</option><option>Rare</option><option>Epic</option>
        <option>Legendary</option><option>Mythical</option><option>Cosmic</option>
      </select>
      </div>
      
      <select id="sort">
        <option value="popular">เรียง: แนะนำ</option>
        <option value="priceAsc">เรียง: ราคา ⬆</option>
        <option value="priceDesc">เรียง: ราคา ⬇</option>
        <option value="atkDesc">เรียง: ATK ⬇</option>
        <option value="hpDesc">เรียง: HP ⬇</option>
      </select>
    </div>

    <div class="grid" id="shopGrid"></div>
    <div class="footer-note">หลังซื้อ การ์ดจะถูกเพิ่มเข้า <b>เด็ค</b> ของคุณทันที (เก็บไว้ใน LocalStorage)</div>
  </div>

  <script src="../js/core/money.js"></script>
<script src="../js/data/shop-data.js"></script>
<script src="../js/core/bag.js"></script>  
  <script>

   

function goBack(){
  if (document.referrer) {
    // ถ้ามี referrer → กลับไปหน้านั้น
    window.location.href = document.referrer;
  } else {
    // ถ้าไม่มี (เช่นเปิดตรงๆ) → กลับไปหน้า game.html เป็นค่า default
    window.location.href = "game.html";
  }
}

    function getDeck(){ try{ return JSON.parse(localStorage.getItem('deck')||'[]'); }catch(e){ return []; } }
    function saveDeck(deck){ localStorage.setItem('deck', JSON.stringify(deck)); }
    function makeId(){ return 'card-' + Date.now() + '-' + Math.random().toString(36).slice(2,7); }

    const grid=document.getElementById('shopGrid');
    const q=document.getElementById('q');
    const rarFilter=document.getElementById('rarFilter');
    const sortSel=document.getElementById('sort');

    function applyFilters(){
      const query=(q.value||'').toLowerCase();
      const rar=rarFilter.value;
      let list=(SHOP_CARDS||[]).filter(i=>
        (!rar || i.rarity===rar) &&
        ((i.name||"").toLowerCase().includes(query))
      );
      const sort=sortSel.value;
      if(sort==='priceAsc') list.sort((a,b)=>a.price-b.price);
      else if(sort==='priceDesc') list.sort((a,b)=>b.price-a.price);
      else if(sort==='atkDesc') list.sort((a,b)=>b.atk-a.atk);
      else if(sort==='hpDesc') list.sort((a,b)=>b.hp-a.hp);
      else list.sort((a,b)=>b.price-a.price);
      renderGrid(list);
    }

    function renderGrid(list){
  grid.innerHTML='';
  const money = loadMoney();
  const lockedState = JSON.parse(localStorage.getItem("shop_locked") || "{}");
  const bag = loadBag(); // โหลดกระเป๋า

  list.forEach(item=>{
    const rarity = item.rarity;
    const rarityLocked = lockedState[rarity] === true;
    const canBuyMoney = !rarityLocked && money>=item.price;

    // map rarity → memory key
    const memoryMap = {
      "Rare":"memoryRare",
      "Epic":"memoryEpic",
      "Legendary":"memoryLegendary",
      "Mythical":"memoryMythical",
      "Cosmic":"memoryCosmic"
    };
    const memoryKey = memoryMap[rarity];
    const memoryHave = bag[memoryKey] || 0;
    const canBuyShard = !rarityLocked && memoryHave>=50;

    const rarityClass = `rarity-${rarity}`;
    const card=document.createElement('div');
    card.className=`card ${rarityClass} ${rarityLocked ? 'locked':''}`;

    card.innerHTML=`
      <div class="title">
        <div><b>${item.name}</b></div>
        <div class="rar ${item.rarity}">${item.rarity}</div>
      </div>
      <div class="stats">
        <div>ATK: ${item.atk}</div>
        <div>HP: ${item.hp}</div>
        <div>DEF: ${item.def}</div>
         <div class="muted">สกิล: ${item.skill||'-'}</div>
      </div>
      <div class="price">ราคา: ${item.price} 💰</div>
      <div class="actions">
        <button class="buy" ${canBuyMoney?'':'disabled'}>ซื้อด้วยเงิน</button>
        <button class="buy" data-shard ${canBuyShard?'':'disabled'}>ใช้ 50 ชิ้นส่วน</button>
      </div>
     `;

    if(canBuyMoney){
      card.querySelector('button.buy:not([data-shard])')
          .addEventListener('click',()=>buyItem(item));
    }
    if(canBuyShard){
      card.querySelector('button.buy[data-shard]')
          .addEventListener('click',()=>buyWithShard(item,memoryKey));
    }

    grid.appendChild(card);
  });
}

function buyWithShard(item, memoryKey){
  const deck = getDeck();
  const MAX_DECK_SIZE = 100;
  if(deck.length >= MAX_DECK_SIZE){
    alert(`⚠️ เด็คเต็ม!`);
    return;
  }

  let bag = loadBag();
  if((bag[memoryKey]||0) < 50){
    alert("ชิ้นส่วนไม่พอ!");
    return;
  }

  if(!confirm(`ใช้ 50 ชิ้นส่วนเพื่อแลก ${item.name} ?`)) return;

  // หักชิ้นส่วน
  bag[memoryKey] -= 50;
  localStorage.setItem("bag", JSON.stringify(bag));

  // เพิ่มการ์ดเข้า deck
  const newCard=structuredClone(item);
  newCard.id=makeId();
  deck.push(newCard);
  saveDeck(deck);

  // ล็อค rarity
  const lockedState = JSON.parse(localStorage.getItem("shop_locked") || "{}");
  lockedState[item.rarity] = true;
  localStorage.setItem("shop_locked", JSON.stringify(lockedState));

  applyFilters();
  alert("แลกสำเร็จ! การ์ดถูกเพิ่มเข้าเด็คแล้ว");
}
    function buyItem(item){
    let money = loadMoney(); // เพิ่มตรงนี้
    const MAX_DECK_SIZE = 100;


  const deck = getDeck();
  if (deck.length >= MAX_DECK_SIZE) {
    alert(`⚠️ เด็คเต็ม! ตอนนี้ ${deck.length}/${MAX_DECK_SIZE}\nไม่สามารถซื้อเพิ่มได้`);
    return;
  }

  if(!confirm(`ซื้อ ${item.name} ในราคา ${item.price} ?`)) return;


  if(money<item.price){ 
    alert("เงินไม่พอ"); 
    return; 
  }

  // หักเงิน
  money-=item.price;
  localStorage.setItem("deckgame_money",money);
  updateMoneyUI();

  // เพิ่มการ์ดเข้า deck
  const newCard=structuredClone(item);
  newCard.id=makeId();
  deck.push(newCard);
  saveDeck(deck);

  // ล็อคเฉพาะ rarity ของการ์ดนี้
  const lockedState = JSON.parse(localStorage.getItem("shop_locked") || "{}");
  lockedState[item.rarity] = true;
  localStorage.setItem("shop_locked", JSON.stringify(lockedState));

  applyFilters();
  alert("ซื้อสำเร็จ! การ์ดถูกเพิ่มเข้าเด็คแล้ว");
}

    [q,rarFilter,sortSel].forEach(el=>el.addEventListener('input',applyFilters));
    updateMoneyUI();
    applyFilters();
    
function getCycle(){
  return Math.floor(Date.now() / REFRESH_INTERVAL);
}

function refreshShopByDeck(){
  const currentCycle = getCycle();
  const savedCycle = parseInt(localStorage.getItem("shop_cycle") || "-1", 10);

  // ถ้าเพิ่งเข้ามา และยังอยู่ในรอบเดิม → ใช้ร้านเดิมที่เคยเซฟไว้
  if(savedCycle === currentCycle){
  const saved = localStorage.getItem("shop_cards");
  if(saved){
    window.SHOP_CARDS = JSON.parse(saved);

    // โหลดสถานะล็อคด้วย
    const savedLocked = localStorage.getItem("shop_locked");
    if(savedLocked){
      window.shop_locked = JSON.parse(savedLocked);
    }

    if(typeof applyFilters==="function") applyFilters();
    return;
  }
}

  // ถ้าเข้ารอบใหม่ → สุ่มร้านใหม่
  // ถ้าเข้ารอบใหม่ → สุ่มร้านใหม่
const newDeck = generateShopDeck();
window.SHOP_CARDS = newDeck;
localStorage.setItem("shop_cards", JSON.stringify(newDeck));
localStorage.setItem("shop_cycle", currentCycle);

// รีเซ็ตการซื้อ (เฉพาะตอนเข้ารอบใหม่เท่านั้น)
let locked = {Cosmic:false, Mythical:false, Legendary:false, Epic:false, Rare:false};
localStorage.setItem("shop_locked", JSON.stringify(locked));

  if(typeof applyFilters==="function") applyFilters();
}

// เริ่มต้น
refreshShopByDeck();
// ไม่ต้อง setInterval ตรงนี้แล้ว เพราะเราจะอิงจากเวลา Date.now() โดยตรง
// ฟังก์ชันอัปเดตตัวจับเวลารีการ์ด
function updateTimer(){
  const now = Date.now();
  const interval = window.REFRESH_INTERVAL || 300000; // fallback เผื่อค่าไม่ถูกตั้ง
  const cycle = Math.floor(now / interval);
  const nextRefresh = (cycle + 1) * interval;
  let remain = nextRefresh - now;

  if (remain < 0) remain = 0;
  const sec = Math.floor(remain / 1000) % 60;
  const min = Math.floor(remain / 60000);

  const text = remain > 0
    ? `🕒 รีการ์ดใหม่อีก ${min}:${sec.toString().padStart(2,'0')} นาที`
    : "🔄 กำลังรีการ์ดใหม่...";

  const timerEl = document.getElementById("refresh-timer");
  if (timerEl) timerEl.textContent = text;
}

// เริ่มนับถอยหลัง
setInterval(updateTimer, 1000);
updateTimer();

setInterval(()=>{
  refreshShopByDeck();
}, 5000);
  </script>
</body>
</html>
