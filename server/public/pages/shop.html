<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title><span class=gicon-cart></span> SHOP — ซื้อการ์ด</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0c121b" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <script src="../js/core/ui-scale.js"></script>
  <script src="../js/core/pwa-register.js" defer></script>
  <link rel="stylesheet" href="../css/game.css" />
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/icons.css" />
  <script src="../js/core/ui-popup.js"></script>
  </head>
<body>
  <header class="topbar">
    <h1><span class=gicon-cart></span> Shop</h1>
    <div class="right-group">
      <div class="money-box" id="moneyWindow"><span class=gicon-coin></span> 0</div>
    </div>
  </header>
<div id="refresh-timer" class="footer-note"></div>
  <div class="panel">
    <div class="searchbar">
      <input id="q" type="text" placeholder="ค้นหาชื่อการ์ด..." />
      <select id="rarFilter">
        <option value="">ทุกความแรร์</option>
        <option>Common</option><option>Rare</option><option>Epic</option>
        <option>Legendary</option><option>Mythical</option><option>Cosmic</option>
      </select>

      <select id="sort">
        <option value="popular">เรียง: แนะนำ</option>
        <option value="priceAsc">เรียง: ราคา <span class=gicon-arrow-up></span></option>
        <option value="priceDesc">เรียง: ราคา <span class=gicon-arrow-down></span></option>
        <option value="atkDesc">เรียง: ATK <span class=gicon-arrow-down></span></option>
        <option value="hpDesc">เรียง: HP <span class=gicon-arrow-down></span></option>
      </select>
    </div>

    <div class="grid" id="shopGrid"></div>
    <div class="footer-note">หลังซื้อ การ์ดจะถูกเพิ่มเข้า <b>เด็ค</b> ของคุณทันที และบันทึกไว้บนเซิร์ฟเวอร์ (ต้องเข้าสู่ระบบ)</div>
  </div>

  <script src="../js/core/money.js"></script>
<script src="../js/core/api.js"></script>
<script src="../js/core/auth-ui.js"></script>
<script src="../js/core/deck.js"></script>
<script src="../js/core/bag.js"></script>
<script src="../js/data/character-data.js"></script>
<script src="../js/data/shop-data.js"></script>
  <script>
// ---------------------------------------------------------------------------
// Shop UI. All the actual money/shard-checking, slot ownership and rarity-lock
// logic lives on the server now (routes/economy.js) — this file only renders
// what the server says and calls GameAPI.shopBuy()/shopBuyWithShard(), the same
// pattern game.html/boss.html/inf.html use for every other spend. See the
// README section on this patch for why the old localStorage-only version here
// would silently refund itself on the next page load.
//
// window.SHOP_CARDS / window.SHOP_NEXT_REFRESH_AT are populated by shop-data.js
// (refreshShopByDeck() there fetches GameAPI.shopGetCurrent() and re-renders via
// applyFilters() below whenever the shared cycle changes).
// ---------------------------------------------------------------------------

function goBack(){
  if (document.referrer) {
    window.location.href = document.referrer;
  } else {
    window.location.href = "game.html";
  }
}

const MAX_DECK_SIZE = 100;
const MEMORY_KEY_BY_RARITY = {
  Rare: "memoryRare", Epic: "memoryEpic", Legendary: "memoryLegendary",
  Mythical: "memoryMythical", Cosmic: "memoryCosmic",
};
const SHARD_EXCHANGE_COST = 50;

let lockedRarities = new Set();
let purchasedSlots = new Set();

// Pulls this player's purchased slots + rarity locks for the current shop cycle
// from the server (source of truth — replaces the old shop_locked[] in localStorage).
async function refreshLockStatus(){
  if (!GameAPI.isLoggedIn()) { lockedRarities = new Set(); purchasedSlots = new Set(); return; }
  const status = await GameAPI.shopMyStatus();
  if (status) {
    lockedRarities = new Set(status.lockedRarities || []);
    purchasedSlots = new Set(status.purchasedSlots || []);
  }
}

const grid=document.getElementById('shopGrid');
const q=document.getElementById('q');
const rarFilter=document.getElementById('rarFilter');
const sortSel=document.getElementById('sort');

function applyFilters(){
  const query=(q.value||'').toLowerCase();
  const rar=rarFilter.value;
  let list=(window.SHOP_CARDS||[]).filter(i=>
    (!rar || i.rarity===rar) &&
    ((i.name||"").toLowerCase().includes(query))
  );
  const sort=sortSel.value;
  if(sort==='priceAsc') list.sort((a,b)=>a.price-b.price);
  else if(sort==='priceDesc') list.sort((a,b)=>b.price-a.price);
  else if(sort==='atkDesc') list.sort((a,b)=>b.atk-a.atk);
  else if(sort==='hpDesc') list.sort((a,b)=>b.hp-a.hp);
  else list.sort((a,b)=>b.price-a.price);
  renderGrid(list);
}

function renderGrid(list){
  grid.innerHTML='';
  const loggedIn = GameAPI.isLoggedIn();
  const money = typeof loadMoney === "function" ? loadMoney() : 0;
  const bag = typeof loadBag === "function" ? loadBag() : {};
  const deck = typeof loadDeck === "function" ? loadDeck() : [];
  const deckFull = deck.length >= MAX_DECK_SIZE;

  list.forEach(item=>{
    const rarity = item.rarity;
    const rarityLocked = lockedRarities.has(rarity) || purchasedSlots.has(item.slotIndex);
    const canBuyMoney = loggedIn && !rarityLocked && !deckFull && money>=item.price;

    const memoryKey = MEMORY_KEY_BY_RARITY[rarity];
    const memoryHave = memoryKey ? (bag[memoryKey]||0) : 0;
    const canBuyShard = loggedIn && !rarityLocked && !deckFull && memoryKey && memoryHave>=SHARD_EXCHANGE_COST;

    const rarityClass = `rarity-${rarity}`;
    const card=document.createElement('div');
    card.className=`card ${rarityClass} ${rarityLocked ? 'locked':''}`;

    card.innerHTML=`
      <div class="title">
        <div><b>${item.name}</b></div>
        <div class="rar ${item.rarity}">${item.rarity}</div>
      </div>
      <div class="stats">
        <div>ATK: ${item.atk}</div>
        <div>HP: ${item.hp}</div>
        <div>DEF: ${item.def}</div>
         <div class="muted">สกิล: ${item.skill||'-'}</div>
      </div>
      <div class="price">ราคา: ${item.price} <span class=gicon-coin></span></div>
      <div class="actions">
        <button class="buy" ${canBuyMoney?'':'disabled'}>ซื้อด้วยเงิน</button>
        ${memoryKey ? `<button class="buy" data-shard ${canBuyShard?'':'disabled'}>ใช้ ${SHARD_EXCHANGE_COST} ชิ้นส่วน</button>` : ''}
      </div>
     `;

    if(canBuyMoney){
      card.querySelector('button.buy:not([data-shard])')
          .addEventListener('click',()=>handleBuyMoney(item));
    }
    const shardBtn = card.querySelector('button.buy[data-shard]');
    if(canBuyShard && shardBtn){
      shardBtn.addEventListener('click',()=>handleBuyShard(item));
    }

    grid.appendChild(card);
  });
}

async function handleBuyMoney(item){
  if(!GameAPI.isLoggedIn()){ alert("ต้องเข้าสู่ระบบ (username + PIN) ก่อนซื้อของ"); return; }
  if(!(await uiConfirm(`ซื้อ ${item.name} ในราคา ${item.price} ?`))) return;

  const result = await GameAPI.shopBuy(item.slotIndex);
  if(!result || !result.ok){
    alert("ซื้อไม่สำเร็จ: " + (result?.error || "unknown error"));
    return;
  }
  applyServerMoney(result.money);
  applyServerDeck(result.deck);
  await refreshLockStatus();
  applyFilters();
  alert("ซื้อสำเร็จ! การ์ดถูกเพิ่มเข้าเด็คแล้ว");
}

async function handleBuyShard(item){
  if(!GameAPI.isLoggedIn()){ alert("ต้องเข้าสู่ระบบ (username + PIN) ก่อนซื้อของ"); return; }
  if(!(await uiConfirm(`ใช้ ${SHARD_EXCHANGE_COST} ชิ้นส่วนเพื่อแลก ${item.name} ?`))) return;

  const result = await GameAPI.shopBuyWithShard(item.slotIndex);
  if(!result || !result.ok){
    alert("แลกไม่สำเร็จ: " + (result?.error || "unknown error"));
    return;
  }
  applyServerBag(result.bag);
  applyServerDeck(result.deck);
  await refreshLockStatus();
  applyFilters();
  alert("แลกสำเร็จ! การ์ดถูกเพิ่มเข้าเด็คแล้ว");
}

[q,rarFilter,sortSel].forEach(el=>el.addEventListener('input',applyFilters));

// Countdown display only — the actual refresh (re-fetching the lineup) is driven
// by shop-data.js watching window.SHOP_NEXT_REFRESH_AT.
function updateTimer(){
  const now = Date.now();
  // Fallback interval before the first server response arrives — pulled from
  // window.SHOP_REFRESH_INTERVAL_MS (set by shop-data.js from the server's
  // SHOP_REFRESH_INTERVAL_MS), not hand-copied here. Only falls back to a
  // literal if even that hasn't loaded yet.
  const fallbackIntervalMs = window.SHOP_REFRESH_INTERVAL_MS || 300000;
  const nextRefresh = window.SHOP_NEXT_REFRESH_AT || (now + fallbackIntervalMs);
  let remain = nextRefresh - now;
  if (remain < 0) remain = 0;
  const sec = Math.floor(remain / 1000) % 60;
  const min = Math.floor(remain / 60000);
  const text = remain > 0
    ? `<span class=gicon-clock></span> รีการ์ดใหม่อีก ${min}:${sec.toString().padStart(2,'0')} นาที`
    : "<span class=gicon-refresh></span> กำลังรีการ์ดใหม่...";
  const timerEl = document.getElementById("refresh-timer");
  if (timerEl) timerEl.textContent = text;
}
setInterval(updateTimer, 1000);
updateTimer();

async function boot(){
  updateMoneyUI();
  await refreshLockStatus();
  applyFilters();
}
document.addEventListener("DOMContentLoaded", boot);
  </script>
<script src="../js/core/nav-fab.js"></script>
<script src="../js/core/mail-fab.js"></script>
</body>
</html>
