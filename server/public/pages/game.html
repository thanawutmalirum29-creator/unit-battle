<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>(Turn-Based)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="../css/game.css" />
  <link rel="stylesheet" href="../css/skills.css" />
  <link rel="stylesheet" href="../css/theme.css" />
  <script src="../js/core/ui-popup.js"></script>
</head>
<body>
<header class="topbar">
  <h1>🎴 Normal Mode</h1>
  <div class="right-group">
    <div id="moneyWindow">💰 400</div>
  </div>
</header>

<div id="bagMount"></div>

<button id="cancelBattleBtn" style="display:none">❌ ยกเลิกการต่อสู้</button>

<section>
  <h3 id="deckHeader">เด็คของฉัน — เลือกการ์ดเป็นทีม</h3>
  <div id="deck-wrapper"></div>
</section>

<div style="margin:8px 0">
  <span class="">ความเร็ว:</span>
  <button class="speed-btn" data-mul="1">×1</button>
  <button class="speed-btn" data-mul="2">×2</button>
  <button class="speed-btn" data-mul="3">×3</button>
  <button class="speed-btn" data-mul="4">×4</button>
</div>

<div class="stage-list" id="stageList"></div>

<hr>
<div id="stageInfo"></div>

<div class="right">
  <div class="panel battlefield-panel">
    <h3>สนามต่อสู้</h3>
    <div id="battlefield" style="display:flex; justify-content:space-between; gap:20px;">
      <div id="playerTeamBox" class="team-box"></div>
      <div id="enemyTeamBox" class="team-box"></div>
    </div>
  </div>
  <div class="panel">
    <h3>Battle Log</h3>
    <div id="battleLog"></div>
    <div id="result"></div>
  </div>
</div>


<script src="../stages/n-stages.js"></script>
<script src="../js/core/drops.js"></script>
<script src="../js/core/battle.js"></script>
<script src="../js/core/bag.js"></script>
<script src="../js/core/Hpbar.js"></script>
<script src="../js/skills/playanimationskill.js"></script>
<script src="../js/skills/skillHandlers_partDMG.js"></script>
<script src="../js/skills/skillHandlers_partHP.js"></script>
<script src="../js/skills/skillHandlers_partEF1.js"></script>

<script src="../js/skills/skillHandlers_partSummon.js"></script>
<script src="../js/skills/useSkill.js"></script>
<script src="../js/skills/attack.js"></script>
<script src="../js/skills/Intermediaryfunction.js"></script>
<script src="../js/core/render.js"></script>
<script src="../js/core/money.js"></script>
<script src="../js/core/deck.js"></script>

<script src="../js/core/log.js"></script>
<script src="../js/core/endroud.js"></script>
<script src="../js/core/api.js"></script>
<script src="../js/core/auth-ui.js"></script>
<script src="../js/modes/NORMAL/N-Mode.js"></script>



<script src="../js/core/nav-fab.js"></script>
</body>
</html>
