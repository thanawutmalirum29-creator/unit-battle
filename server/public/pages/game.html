<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>ต่อสู้</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0c121b" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <script src="../js/core/ui-scale.js"></script>
<script src="../js/core/scroll-lock.js"></script>
  <script src="../js/core/pwa-register.js" defer></script>
  <link rel="stylesheet" href="../css/game.css" />
  <link rel="stylesheet" href="../css/skills.css" />
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/icons.css" />
  <link rel="stylesheet" href="../css/battle-hub.css" />
  <link rel="stylesheet" href="../css/game-hub.css" />
  <script src="../js/core/ui-popup.js"></script>
  <style>

    /* ============ Battle lock: ระหว่างต่อสู้ให้เหลือแค่ปุ่มยกเลิก/ความเร็ว/สนามต่อสู้/แชท ============ */
    html.battle-lock-active header.topbar,
    html.battle-lock-active .mode-tabs,
    html.battle-lock-active #teamSelectorMount,
    html.battle-lock-active #guestBanner,
    html.battle-lock-active #navFabBall,
    html.battle-lock-active #mailFabBall,
    html.battle-lock-active #dailyFabBall,
    html.battle-lock-active #globalProfileBar,
    html.battle-lock-active .nav-fab-overlay,
    html.battle-lock-active #mailFabOverlay,
    html.battle-lock-active #dailyFabOverlay,
    html.battle-lock-active #acctpOverlay{
      display:none !important;
      pointer-events:none !important;
    }
    /* กันเผื่อพื้นที่เลือกด่าน/บอส/checkpoint โผล่มาปนระหว่างต่อสู้ */
    html.battle-lock-active #normalSelect,
    html.battle-lock-active #bossSelect,
    html.battle-lock-active #infSelect{
      display:none !important;
    }

    #resultsOverlay{
      display:none; position:fixed; inset:0; z-index:10060; align-items:center; justify-content:center;
      padding:16px; background:rgba(4,6,12,.72); backdrop-filter:blur(3px);
    }
    .results-panel{
      width:100%; max-width:560px; max-height:86vh; overflow-y:auto;
      background:linear-gradient(180deg, var(--panel,#141d2b), var(--bg-2,#121a26));
      border:1px solid color-mix(in srgb, var(--hub-accent,#49d3ff) 32%, var(--border,rgba(255,255,255,.08)));
      border-radius:0; box-shadow:var(--shadow,0 8px 24px rgba(0,0,0,.45)); padding:22px 20px 18px;
    }
    .results-panel h2{ text-align:center; margin:0 0 8px; }
    .results-panel h2.result-win{ color:#7CFC7C; }
    .results-panel h2.result-lose{ color:#FF7043; }
    .results-note{ text-align:center; color:var(--muted,#93a1b5); font-size:13px; margin:0 0 12px; }
    .results-rewards{
      background:var(--panel-soft,rgba(255,255,255,.04)); border:1px solid var(--border,rgba(255,255,255,.08));
      border-left:2px solid var(--hub-accent,#49d3ff);
      border-radius:0 var(--radius-sm,9px) var(--radius-sm,9px) 0; padding:10px 12px; margin:0 0 14px;
    }
    .results-drops{ list-style:none; margin:6px 0 0; padding:0; font-size:13px; }
    .results-table{ width:100%; border-collapse:collapse; font-size:13px; margin-bottom:16px; }
    .results-table th, .results-table td{ border-bottom:1px solid var(--border,rgba(255,255,255,.08)); padding:6px 8px; text-align:left; }
    .results-table th{ color:var(--muted,#93a1b5); font-weight:700; text-transform:uppercase; font-size:10.5px; letter-spacing:.5px; }
    .results-table tr.row-player td:first-child{ color:#4FC3F7; }
    .results-table tr.row-enemy td:first-child{ color:#FF7043; }
    .results-continue-btn{
      width:100%; padding:13px; border-radius:0; border:none; font-weight:800; font-size:15px;
      background:linear-gradient(135deg,var(--hub-accent,#5c8bff),var(--hub-accent-2,#3f63d6)); color:#0a0e16; cursor:pointer;
      transition:background .3s ease, filter .15s ease;
    }
    .results-continue-btn:hover{ filter:brightness(1.08); }
  </style>
</head>
<body>
<div class="hub-bgfx" aria-hidden="true"></div>
<header class="topbar">
  <h1><span class=gicon-sword></span> ต่อสู้</h1>
  <div class="right-group">
    <div id="moneyWindow"><span class=gicon-coin></span> 400</div>
  </div>
</header>

<div class="mode-tabs">
  <button class="mode-tab-btn" data-mode="normal"><span class=gicon-sword></span> Normal</button>
  <button class="mode-tab-btn" data-mode="boss"><span class=gicon-skull></span> Boss</button>
  <button class="mode-tab-btn" data-mode="inf"><span class=gicon-infinity></span> Infinity</button>
</div>

<div id="teamSelectorMount" data-page-key="normal"></div>

<div class="speed-row">
  <span class="speed-row-label"><span class=gicon-bolt></span> ความเร็ว</span>
  <button class="speed-btn" data-mul="1">×1</button>
  <button class="speed-btn" data-mul="2">×2</button>
  <button class="speed-btn" data-mul="3">×3</button>
  <button class="speed-btn" data-mul="4">×4</button>
</div>

<!-- ============ NORMAL: mode-select area ============ -->
<section id="normalSelect" class="panel mode-panel">
  <div class="section-header">
    <h3><span class=gicon-castle></span> เลือกด่าน</h3>
  </div>
  <div class="bigstage-tabs" id="bigStageTabs"></div>
  <div class="stage-list" id="stageList"></div>
  <div id="stageInfo"></div>
</section>

<!-- ============ BOSS: mode-select area ============ -->
<section id="bossSelect" class="panel mode-panel" style="display:none">
  <div class="section-header boss-section-header">
    <h3><span class=gicon-skull></span> เลือก Boss</h3>
  </div>
  <div id="bossList"></div>
</section>

<!-- ============ INFINITY: mode-select area ============ -->
<section id="infSelect" class="panel mode-panel" style="display:none">
  <div class="section-header">
    <h3><span class=gicon-infinity></span> Infinity</h3>
  </div>
  <div class="inf-hero">
    <div class="inf-hero-actions">
      <button class="inf-start-btn" onclick="startInfGame()"><span class=gicon-battle></span> เริ่มสู้</button>
      <button class="inf-auto-btn" onclick="startInfAuto()"><span class=gicon-refresh></span> Auto</button>
    </div>
    <div class="inf-stage-card">
      <span class="inf-stage-label">INF Stage</span>
      <span id="infStageInfo" class="inf-stage-value">ยังไม่เริ่ม</span>
    </div>
  </div>
  <div class="stage-list checkpoint-list" id="infCheckpointList"></div>
</section>

<!-- ============ SHARED: battle screen — โผล่เฉพาะตอนกำลังต่อสู้เท่านั้น ============ -->
<div id="battleScreen" style="display:none">
  <button id="cancelBattleBtn" style="display:none"><span class=gicon-x></span> ยกเลิกการต่อสู้</button>
  <div style="font-size:12px; color:var(--muted,#93a1b5); margin:6px 0 2px">
    <span class=gicon-lock></span> กำลังต่อสู้ — ออกจากหน้านี้ได้เฉพาะกด "ยกเลิกการต่อสู้" หรือรอจนเกมจบเท่านั้น
  </div>

  <div class="right">
    <div class="panel battlefield-panel">
      <h3>สนามต่อสู้</h3>
      <div id="battlefield" style="display:flex; justify-content:space-between; gap:20px;">
        <div id="playerTeamBox" class="team-box"></div>
        <div id="enemyTeamBox" class="team-box"></div>
      </div>
    </div>
    <div class="panel">
      <h3>Battle Log</h3>
      <div id="battleLog"></div>
      <div id="result"></div>
    </div>
  </div>
</div>

<!-- ============ SHARED: ผลสรุปหลังจบการต่อสู้ ============ -->
<div id="resultsOverlay"></div>

<!-- ============ Shared core scripts (ใช้ร่วมกันทั้ง 3 โหมด) ============ -->
<script src="../js/shared/battle-math.js"></script>
<script src="../js/shared/inf-data.js"></script>
<script src="../stages/n-stages.js"></script>
<script src="../js/modes/BOSS/bossmap.js"></script>
<script src="../js/data/equip.js"></script>
<script src="../js/core/drops.js"></script>
<script src="../js/core/battle.js"></script>
<script src="../js/core/bag.js"></script>
<script src="../js/core/Hpbar.js"></script>
<script src="../js/skills/playanimationskill.js"></script>
<script src="../js/skills/skillHandlers_partDMG.js"></script>
<script src="../js/skills/skillHandlers_partHP.js"></script>
<script src="../js/skills/skillHandlers_partEF1.js"></script>
<script src="../js/skills/skillHandlers_partSummon.js"></script>
<script src="../js/skills/useSkill.js"></script>
<script src="../js/skills/attack.js"></script>
<script src="../js/skills/Intermediaryfunction.js"></script>
<script src="../js/core/render.js"></script>
<script src="../js/core/money.js"></script>
<script src="../js/core/deck.js"></script>
<script src="../js/core/team-store.js"></script>
<script src="../js/core/team-select-ui.js"></script>
<script src="../js/core/log.js"></script>
<script src="../js/core/endroud.js"></script>
<script src="../js/core/api.js"></script>
<script src="../js/core/auth-ui.js"></script>

<!-- ตัวควบคุมหน้ารวมโหมด — ต้องมาก่อนสคริปต์ของแต่ละโหมด (โหลดแบบ lazy ทีหลัง) -->
<script src="../js/core/hub-ui.js"></script>

<script src="../js/core/nav-fab.js"></script>
<script src="../js/core/mail-fab.js"></script>
<script src="../js/core/daily-fab.js"></script>
<script src="../js/core/account-panel.js"></script>
</body>
</html>
