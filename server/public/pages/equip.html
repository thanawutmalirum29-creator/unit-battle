<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>🛡️ สวมใส่อุปกรณ์</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0c121b" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <script src="../js/core/ui-scale.js"></script>
  <script src="../js/core/pwa-register.js" defer></script>
  <link rel="stylesheet" href="../css/theme.css" />
  <script src="../js/core/ui-popup.js"></script>
  <style>
    /* ⚠️ override กฎเก่าใน theme.css ที่ทำไว้สำหรับกระเป๋าอุปกรณ์แบบลิสต์บรรทัดเดียว
       (display:flex; flex-wrap:wrap บน #equipBag ทำให้พาเนลกริดใหม่ถูกบีบให้แคบกว่าที่ควร) */
    #equipBag{
      display:block !important;
      gap:0 !important;
      margin-bottom:0 !important;
    }
    .equip-bag-panel{
      width:100%;
    }
    .equip-card{
      display:block !important;
      justify-content:initial !important;
    }

    /* ===== กระเป๋าอุปกรณ์ ===== */
    .equip-bag-panel{
      background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      border:1px solid rgba(255,255,255,0.12);
      border-radius:16px;
      padding:14px;
      margin-top:8px;
      box-shadow:0 4px 14px rgba(0,0,0,0.18) inset;
    }
    .equip-bag-toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:12px;
    }
    .equip-bag-toolbar button{
      border:none;
      border-radius:10px;
      padding:7px 12px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      color:#fff;
      transition:transform .12s ease, filter .12s ease;
    }
    .equip-bag-toolbar button:hover{ transform:translateY(-1px); filter:brightness(1.1); }
    #deleteCommonBtn{ background:#6b7280; }
    #deleteRareBtn{ background:#3b82f6; }

    .equip-bag-empty{
      text-align:center;
      padding:30px 10px;
      opacity:.7;
      font-size:14px;
    }

    .equip-bag-grid{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:10px;
    }
    @media (min-width:480px){
      .equip-bag-grid{ grid-template-columns:repeat(3, 1fr); }
    }
    @media (min-width:720px){
      .equip-bag-grid{ grid-template-columns:repeat(4, 1fr); }
    }

    .equip-card{
      position:relative;
      border-radius:12px;
      padding:14px 10px 12px;
      text-align:center;
      cursor:pointer;
      user-select:none;
      background:rgba(255,255,255,0.05);
      border:1.5px solid rgba(255,255,255,0.15);
      transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
      overflow:hidden;
      min-height:100px;
    }
    .equip-card:hover{
      transform:translateY(-3px) scale(1.03);
      box-shadow:0 6px 14px rgba(0,0,0,0.35);
    }
    .equip-card.rarity-Common   { border-color:#9ca3af; }
    .equip-card.rarity-Rare     { border-color:#3b82f6; box-shadow:0 0 8px rgba(59,130,246,.35); }
    .equip-card.rarity-Epic     { border-color:#a855f7; box-shadow:0 0 8px rgba(168,85,247,.4); }
    .equip-card.rarity-Legendary{ border-color:#f59e0b; box-shadow:0 0 10px rgba(245,158,11,.5); }

    .equip-card-icon{ font-size:26px; line-height:1; margin-bottom:6px; }
    .equip-card-name{ font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .equip-card-rarity{ font-size:11px; opacity:.8; margin-top:3px; }
    .equip-card-bonus{ font-size:12px; margin-top:6px; font-weight:600; color:#34d399; }

    .equip-bag-pager{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-top:12px;
      font-size:13px;
    }
    .equip-bag-pager button{
      border:none;
      border-radius:8px;
      padding:5px 10px;
      background:rgba(255,255,255,0.12);
      color:#fff;
      cursor:pointer;
    }
    .equip-bag-pager button:hover{ background:rgba(255,255,255,0.22); }
  </style>
</head>
<body>
<header class="topbar">
  <h1>🛡️ สวมใส่อุปกรณ์</h1>
</header>
<section>
  <h3>🎒 กระเป๋าอุปกรณ์</h3>
  <div id="equipBag"></div>
</section>

<section>
  <h3>เด็คของฉัน — คลิก "ใส่อุปกรณ์" เพื่อเลือกจากกระเป๋า</h3>
  <div id="deckList" class="upgrade-grid"></div>
</section>

<div id="equipPopup" class="equip-popup"></div>

<script src="../js/skills/Intermediaryfunction.js"></script>
<script src="../js/core/money.js"></script>
<script src="../js/core/api.js"></script>
<script src="../js/core/auth-ui.js"></script>
<script src="../js/core/deck.js"></script>
<script src="../js/core/equipbag.js"></script>
<script src="../js/data/equip.js"></script>
<script src="../js/core/nav-fab.js"></script>
<script src="../js/core/mail-fab.js"></script>
</body>
</html>
