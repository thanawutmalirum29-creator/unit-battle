<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>Gacha Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0c121b" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<script src="../js/core/ui-scale.js"></script>
<script src="../js/core/pwa-register.js" defer></script>
<link rel="stylesheet" href="../css/theme.css" />
<link rel="stylesheet" href="../css/icons.css" />
<script src="../js/core/ui-popup.js"></script>

</head>
<body onload="renderGachaBoxes()">
<header class="topbar">
  <h1>🔮 Gacha</h1>
  <div class="right-group">
    <div id="moneyWindow"><span class=gicon-coin></span> 0</div>
  </div>
</header>
<div class="gacha-container"></div>
<div id="gachaOverlay">
  <button id="skipButton" class="hidden">⏩ Skip</button>
</div>
<!-- popup -->
<div id="ratePopup" class="popup hidden">
  <div class="popup-content">
    <h3>อัตราดรอป เป็นเพียงเรทโดยรวม</h3>
    <div id="rateDetails"></div>
    <button onclick="closePopup()">ปิด</button>
  </div>
</div>

<script src="../js/data/character-data.js"></script>
<script src="../js/data/gacha-data.js"></script>
<script src="../js/data/gacha-fix.js"></script>
<script src="../js/core/money.js"></script>
<script src="../js/core/api.js"></script>
<script src="../js/core/auth-ui.js"></script>
<script src="../js/core/bag.js"></script>
<script src="../js/core/deck.js"></script>
<script>

let money = loadMoney();
// ฟังก์ชันช่วยกำหนด min cost รายตู้

function renderGachaBoxes(){
  const wrap = document.querySelector(".gacha-container");
  wrap.innerHTML = "";
  for(const key in GACHA_POOLS){
    const poolObj = GACHA_POOLS[key];
    const f = poolObj.featuredCard;
    const def = f.def !== undefined ? f.def : "?";

    // ราคาปกติ
    let cost1 = poolObj.cost;
// ✅ ตรวจตาม poolKey
cost1 = enforceMinCost(key, cost1);

    const cost3 = Math.floor(cost1 * 3 * 0.9); // ลด 10%
    const cost10 = Math.floor(cost1 * 10 * 0.8); // ลด 20%

    const box = document.createElement("div");
    box.className = "gacha-box";
    box.innerHTML = `
      <div class="gacha-header">
        <span>${f.icon} ${f.bannerName}</span>
        <button onclick="showRates('${key}')">!</button>
      </div>
      <div class="gacha-featured">
        <div class="card rarity-${f.rarity}">
          <div class="title">${f.name}</div>
          <div class="meta"><span class=gicon-star></span> ${f.rarity}</div>
          <div style="margin-top:4px; font-size:10px">
            HP:${f.hp} • ATK:${f.atk} • DEF:${def}
          </div>
          <div class="meta" style="margin-top:2px; font-size:10px">
            Skill:${f.skill}
          </div>
        </div>
      </div>
      <div class="gacha-actions">
        <button onclick="gachaPull('${key}',1)">สุ่ม 1 (${formatPrice(cost1)}<span class=gicon-coin></span>)</button>
<button onclick="gachaPull('${key}',3)">สุ่ม 3 (${formatPrice(cost3)}<span class=gicon-coin></span>)</button>
<button onclick="gachaPull('${key}',10)">สุ่ม 10 (${formatPrice(cost10)}<span class=gicon-coin></span>)</button>
      </div>
    `;
    wrap.appendChild(box);
  }
}
function formatPrice(num) {
  if (num >= 1_000_000_000_000_000_000_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000_000_000_000_000_000_000_000 * 10) / 10 + "g";
}
if (num >= 1_000_000_000_000_000_000_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000_000_000_000_000_000_000 * 10) / 10 + "f";
}
if (num >= 1_000_000_000_000_000_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000_000_000_000_000_000 * 10) / 10 + "d";
}
if (num >= 1_000_000_000_000_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000_000_000_000_000 * 10) / 10 + "c";
}
if (num >= 1_000_000_000_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000_000_000_000 * 10) / 10 + "b";
}
if (num >= 1_000_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000_000 * 10) / 10 + "a";
}
if (num >= 1_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000 * 10) / 10 + "Q";
}
if (num >= 1_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000 * 10) / 10 + "T";
}
if (num >= 1_000_000_000) {
  return Math.floor(num / 1_000_000_000 * 10) / 10 + "B";
}
  if (num >= 1_000_000) {
    return Math.floor(num / 1_000_000 * 10) / 10 + "M";
  }
  if (num >= 1000) {
    return Math.floor(num / 1000 * 10) / 10 + "K";
  }
  return num.toString();
}

function weightedPick(items){
  const total = items.reduce((s,it)=>s+it.rate, 0);
  let r = Math.random() * total;
  for(const it of items){
    if(r < it.rate) return it;
    r -= it.rate;
  }
  return items[items.length-1];
}

async function gachaPull(poolKey, count) {
  if (!window.GameAPI || !GameAPI.isLoggedIn()) {
    alert("ต้องเข้าสู่ระบบ (username + PIN) ก่อนสุ่มกาชา");
    return;
  }
  // เซิฟเป็นคนคำนวณ cost/สุ่มการ์ด/หักเงิน/บันทึกลง deck ทั้งหมด (ดู routes/economy.js gacha/roll)
  // การ์ดที่ติ๊กแบล็คลิสไว้ (ปุ่ม "!" ดูเรท) จะไม่ถูกเติมเข้า deck เลย — เซิฟเช็คให้แล้ว
  const blacklist = JSON.parse(localStorage.getItem("gacha_blacklist") || "[]");
  const result = await GameAPI.gachaRoll(poolKey, count, blacklist);
  if (!result || !result.ok) {
    alert("สุ่มไม่สำเร็จ: " + (result?.error || "unknown error"));
    return;
  }
  applyServerMoney(result.money);
  if (typeof applyServerDeck === "function") applyServerDeck(result.deck);
  // การ์ดที่ติดแบล็คลิสถูกเซิฟขายอัตโนมัติ + ตัวซ้ำได้ชิ้นส่วนความทรงจำเพิ่ม (ดู routes/economy.js
  // gacha/roll) เงินที่ได้รวมอยู่ใน result.money แล้ว ส่วนชิ้นส่วนความทรงจำต้องอัพเดต bag เอง
  if (typeof applyServerBag === "function" && result.bag) applyServerBag(result.bag);
  showPulledCards(result.results);
}

// 🔐 ขายการ์ด — เซิฟเป็นคนตรวจการมีอยู่จริง + คิดราคาเอง (เดิมหน้านี้มีตาราง
// ราคาของตัวเองที่ไม่ตรงกับ render.js เลย — ตอนนี้เหลือแหล่งราคาเดียวคือเซิฟ)
async function sellCard(cardId){
  if (!window.GameAPI || !GameAPI.isLoggedIn()) {
    alert("ต้องเข้าสู่ระบบ (username + PIN) ก่อนขายการ์ด");
    return;
  }
  const result = await GameAPI.sellCard(cardId);
  if (!result || !result.ok) {
    alert("ขายไม่สำเร็จ: " + (result?.error || "unknown error"));
    return;
  }
  applyServerMoney(result.money);
  if (typeof applyServerDeck === "function") applyServerDeck(result.deck);
  else localStorage.setItem("deck", JSON.stringify(result.deck));

  if (typeof renderDeck === "function") renderDeck();
}
function showRates(poolKey){
  currentRatePool = poolKey;
  const pool = GACHA_POOLS[poolKey].pool;
  const grouped = pool.reduce((map, it)=>{
    if (!map[it.rarity]) map[it.rarity] = { rate: 0, chars: [] };
    map[it.rarity].rate += it.rate;
    map[it.rarity].chars.push(it);
    return map;
  }, {});

  let blacklist = JSON.parse(localStorage.getItem("gacha_blacklist") || "[]");

  // ⭐ กำหนดลำดับที่อยากให้แสดง
  const rarityOrder = ["Cosmic", "Mythical", "Legendary", "Epic", "Rare", "Common"];

  let html = "";
  for (const rarity of rarityOrder){
    if (!grouped[rarity]) continue; // ถ้า pool นี้ไม่มี rarity นั้นก็ข้าม
    const g = grouped[rarity];
    html += `
      <div class="rate-row ${rarity}">
        <span>${rarity}</span>
        <span>${g.rate.toFixed(2)}%</span>
      </div>
      <div class="char-grid">
        ${g.chars.map(c => `
          <div class="rarity-${c.rarity}" 
               style="cursor:pointer; ${blacklist.includes(c.name) ? 'text-decoration: line-through; color:red;' : ''}" 
               onclick="toggleBlacklist('${c.name}')">
            • ${c.name} ${blacklist.includes(c.name) ? '<span class=gicon-x></span>' : ''}
          </div>
        `).join("")}
      </div>
    `;
  }

  document.getElementById("rateDetails").innerHTML = html;
  document.getElementById("ratePopup").classList.remove("hidden");
  document.body.classList.add("no-scroll");
}
let currentRatePool = null; // ⭐ เก็บ poolKey ล่าสุดที่เปิดเรท

function toggleBlacklist(name){
  let blacklist = JSON.parse(localStorage.getItem("gacha_blacklist") || "[]");
  if (blacklist.includes(name)){
    blacklist = blacklist.filter(n => n !== name);
  } else {
    blacklist.push(name);
  }
  localStorage.setItem("gacha_blacklist", JSON.stringify(blacklist));

  // เซฟขึ้นเซิร์ฟเวอร์ด้วย ไม่ใช่แค่ localStorage — กันเบราว์เซอร์/เครื่องอื่นไม่เห็นรายการที่ติ๊กไว้
  if (window.GameAPI && GameAPI.saveGachaBlacklist) GameAPI.saveGachaBlacklist(blacklist);

  if (currentRatePool) {
    showRates(currentRatePool);
  }


}

function closePopup(){
  document.getElementById("ratePopup").classList.add("hidden");

  // 🔓 ปลดล็อกการเลื่อน
  document.body.classList.remove("no-scroll");
}

document.addEventListener("DOMContentLoaded", renderGachaBoxes);

// ซิงก์แบล็คลิสจากเซิร์ฟเวอร์ตอนโหลดหน้า — กันเบราว์เซอร์/เครื่องอื่นเห็นรายการไม่ตรงกัน
// (เหมือนกับ syncEquipBlacklistFromServer ใน data/equip-gacha.js)
async function syncGachaBlacklistFromServer() {
  if (!window.GameAPI || !GameAPI.isLoggedIn || !GameAPI.isLoggedIn()) return;
  const state = await GameAPI.fetchEconomyState();
  if (state && Array.isArray(state.gacha_blacklist)) {
    localStorage.setItem("gacha_blacklist", JSON.stringify(state.gacha_blacklist));
    if (currentRatePool) showRates(currentRatePool);
  }
}
document.addEventListener("DOMContentLoaded", syncGachaBlacklistFromServer);

// ป้ายบอกผลตอบแทนพิเศษ: การ์ดแบล็คลิส = ขายอัตโนมัติ, การ์ดซ้ำ = ได้ชิ้นส่วนความทรงจำแถม
function cardRewardBadge(card) {
  if (card._blacklisted) {
    const bits = ['<span class=gicon-x></span>'];
    if (card._autoSoldFor) bits.push(`<span class=gicon-coin></span>+${card._autoSoldFor}`);
    if (card._memoryGained) bits.push(`<span class=gicon-gem></span>+${card._memoryGained}`);
    return bits.join(" ");
  }
  if (card._memoryGained) return `<span class=gicon-gem></span>+${card._memoryGained}`;
  return "";
}

async function showPulledCards(cards) {
  const overlay = document.getElementById("gachaOverlay");
  const skipBtn = document.getElementById("skipButton");
  let skipped = false;

  // ✅ แสดง overlay ทุกครั้ง
  overlay.style.display = "flex";
  document.body.classList.add("no-scroll");

  // ✅ ลบ element การ์ดเก่าออก แต่ไม่ลบปุ่ม Skip
  Array.from(overlay.querySelectorAll(".gacha-fly-card, .gacha-static-card, .result-wrap"))
       .forEach(el => el.remove());

  function cleanup() {
    overlay.style.display = "none";
    Array.from(overlay.querySelectorAll(".gacha-fly-card, .gacha-static-card, .result-wrap"))
         .forEach(el => el.remove());
    skipBtn.classList.add("hidden");
    document.body.classList.remove("no-scroll");
    // การ์ดที่ติ๊กแบล็คลิสไว้ไม่เคยถูกเติมเข้า deck ตั้งแต่แรก (เซิฟกรองให้แล้วใน
    // /api/economy/gacha/roll) จึงไม่ต้อง "ขายทิ้ง" อะไรตรงนี้อีก
  }

  function renderAll() {
    // ลบผลลัพธ์เก่า
    Array.from(overlay.querySelectorAll(".gacha-fly-card, .gacha-static-card, .result-wrap"))
         .forEach(el => el.remove());

    const wrap = document.createElement("div");
    wrap.className = "result-wrap";
    wrap.style.display = "flex";
    wrap.style.flexDirection = "column";
    wrap.style.alignItems = "center";
    wrap.style.gap = "20px";
    wrap.style.marginTop = "30px";
    // #gachaOverlay เป็น flex row → wrap เป็น flex item ที่ default จะ "หุบตามเนื้อหา"
    // (ไม่ยึดความกว้างจริงของจอ) ต้องบังคับ width:100% ไว้ ไม่งั้น grid ข้างในจะคำนวณ
    // ความกว้างแบบ max-content (พยายามยัดให้ครบคอลัมน์สุดตาม max-width) แล้วล้นจอมือถือ
    wrap.style.width = "100%";
    wrap.style.boxSizing = "border-box";

    // === จัดลำดับความหายาก ===
    const rarityRank = { Cosmic: 6, Mythical: 5, Legendary: 4, Epic: 3, Rare: 2, Common: 1 };
    const sorted = [...cards].sort((a, b) => rarityRank[b.rarity] - rarityRank[a.rarity]);

    if (cards.length === 3) {
      // ⭐ ใบที่ดีที่สุด
      const best = sorted[0];
      const def = best.def ?? "?";
      const bestEl = document.createElement("div");
      bestEl.className = `gacha-static-card rarity-${best.rarity}`;
      bestEl.style.margin = "0 auto"; // ตรงกลาง
      bestEl.innerHTML = `
        <div style="font-size:11.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${best.name} ${cardRewardBadge(best)}</div>
        <div><span class=gicon-star></span> ${best.rarity}</div>
        <div style="font-size:10px">HP:${best.hp} ATK:${best.atk} DEF:${def}</div>
        <div style="font-size:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">Skill: ${best.skill}</div>
      `;
      wrap.appendChild(bestEl);

      // ⭐ อีกสองใบล่าง
      const bottomRow = document.createElement("div");
      bottomRow.style.display = "flex";
      bottomRow.style.gap = "12px";
      bottomRow.style.justifyContent = "center";

      sorted.slice(1).forEach(card => {
        const def = card.def ?? "?";
        const el = document.createElement("div");
        el.className = `gacha-static-card rarity-${card.rarity}`;
        el.innerHTML = `
          <div style="font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${card.name} ${cardRewardBadge(card)}</div>
          <div><span class=gicon-star></span> ${card.rarity}</div>
          <div style="font-size:10px">HP:${card.hp} ATK:${card.atk} DEF:${def}</div>
          <div style="font-size:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">Skill: ${card.skill}</div>
        `;
        bottomRow.appendChild(el);
      });

      wrap.appendChild(bottomRow);
    } else {
      // ✅ layout เดิม (สำหรับ 1, 10 ใบ)
      const container = document.createElement("div");
      container.style.display = "grid";
      // 🟢 อิง --card-w จาก theme.css ตัวเดียว (ตัวแปรกลางเดียวกับทุกการ์ดในเกม)
      // แทนใส่เลข px ซ้ำไว้ที่นี่ — แก้ขนาดการ์ดที่ theme.css ที่เดียวพอ
      container.style.gridTemplateColumns = "repeat(auto-fit, minmax(var(--card-w), 1fr))";
      container.style.gap = "12px";
      container.style.justifyContent = "center";
      container.style.justifyItems = "center";
      container.style.width = "100%";
      container.style.maxWidth = "500px";
      container.style.boxSizing = "border-box";

      cards.forEach(card => {
        const def = card.def ?? "?";
        const el = document.createElement("div");
        el.className = `gacha-static-card rarity-${card.rarity}`;
        el.innerHTML = `
          <div style="font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${card.name} ${cardRewardBadge(card)}</div>
          <div><span class=gicon-star></span> ${card.rarity}</div>
          <div style="font-size:10px">HP:${card.hp} ATK:${card.atk} DEF:${def}</div>
          <div style="font-size:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">Skill: ${card.skill}</div>
        `;
        container.appendChild(el);
      });

      wrap.appendChild(container);
    }

    // ปุ่มปิด
      let closeBtn = overlay.querySelector(".close-btn");
    if (!closeBtn) {
      closeBtn = document.createElement("button");
      closeBtn.className = "close-btn";
      closeBtn.innerText = "ปิด";
      closeBtn.style.padding = "8px 16px";
      closeBtn.style.border = "none";
      closeBtn.style.borderRadius = "6px";
      closeBtn.style.background = "#607d8b";
      closeBtn.style.color = "white";
      closeBtn.style.fontWeight = "bold";
      closeBtn.style.cursor = "pointer";
      closeBtn.onclick = cleanup;
      wrap.appendChild(closeBtn);
    }

    overlay.appendChild(wrap);
  }

  skipBtn.onclick = () => {
    skipped = true;
    renderAll();
    skipBtn.classList.add("hidden");
  };

  // เล่นทีละการ์ด
  for (let i = 0; i < cards.length; i++) {
    if (skipped) break;

    const card = cards[i];
    const def = card.def ?? "?";
    const el = document.createElement("div");
    el.className = `gacha-fly-card rarity-${card.rarity}`;
    el.innerHTML = `
      <div style="font-size:11.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${card.name} ${cardRewardBadge(card)}</div>
      <div><span class=gicon-star></span> ${card.rarity}</div>
      <div style="font-size:10px">HP:${card.hp} ATK:${card.atk} DEF:${def}</div>
      <div style="font-size:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">Skill: ${card.skill}</div>
    `;
    overlay.appendChild(el);

    if (i === 0) skipBtn.classList.remove("hidden");

    await new Promise(r => setTimeout(r, 1000));
    el.classList.add("fade-out");
    await new Promise(r => setTimeout(r, 200));
    el.remove();
  }

  if (!skipped) {
    setTimeout(() => {
      renderAll();
      skipBtn.classList.add("hidden");
    }, 200);
  }
}

</script>
<script src="../js/core/nav-fab.js"></script>
<script src="../js/core/mail-fab.js"></script>
<script src="../js/core/daily-fab.js"></script>
<script src="../js/core/account-panel.js"></script>
</body>
</html>
