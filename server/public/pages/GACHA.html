<script>

let money = loadMoney();
// ฟังก์ชันช่วยกำหนด min cost รายตู้

function renderGachaBoxes(){
  const wrap = document.querySelector(".gacha-container");
  wrap.innerHTML = "";
  for(const key in GACHA_POOLS){
    const poolObj = GACHA_POOLS[key];
    const f = poolObj.featuredCard;
    const def = f.def !== undefined ? f.def : "?";

    // ราคาปกติ
    let cost1 = poolObj.cost;
// ✅ ตรวจตาม poolKey
cost1 = enforceMinCost(key, cost1);

    const cost3 = Math.floor(cost1 * 3 * 0.9); // ลด 10%
    const cost10 = Math.floor(cost1 * 10 * 0.8); // ลด 20%

    const box = document.createElement("div");
    box.className = "gacha-box";
    box.innerHTML = `
      <div class="gacha-header">
        <span>${f.icon} ${f.bannerName}</span>
        <button onclick="showRates('${key}')">!</button>
      </div>
      <div class="gacha-featured">
        <div class="card rarity-${f.rarity}">
          <div class="title">${f.name}</div>
          <div class="meta">⭐ ${f.rarity}</div>
          <div style="margin-top:4px; font-size:12px">
            HP:${f.hp} • ATK:${f.atk} • DEF:${def}
          </div>
          <div class="meta" style="margin-top:2px; font-size:12px">
            Skill:${f.skill}
          </div>
        </div>
      </div>
      <div class="gacha-actions">
        <button onclick="gachaPull('${key}',1)">สุ่ม 1 (${formatPrice(cost1)}💰)</button>
<button onclick="gachaPull('${key}',3)">สุ่ม 3 (${formatPrice(cost3)}💰)</button>
<button onclick="gachaPull('${key}',10)">สุ่ม 10 (${formatPrice(cost10)}💰)</button>
      </div>
    `;
    wrap.appendChild(box);
  }
}
function formatPrice(num) {
  if (num >= 1_000_000_000_000_000_000_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000_000_000_000_000_000_000_000 * 10) / 10 + "g";
}
if (num >= 1_000_000_000_000_000_000_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000_000_000_000_000_000_000 * 10) / 10 + "f";
}
if (num >= 1_000_000_000_000_000_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000_000_000_000_000_000 * 10) / 10 + "d";
}
if (num >= 1_000_000_000_000_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000_000_000_000_000 * 10) / 10 + "c";
}
if (num >= 1_000_000_000_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000_000_000_000 * 10) / 10 + "b";
}
if (num >= 1_000_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000_000 * 10) / 10 + "a";
}
if (num >= 1_000_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000_000 * 10) / 10 + "Q";
}
if (num >= 1_000_000_000_000) {
  return Math.floor(num / 1_000_000_000_000 * 10) / 10 + "T";
}
if (num >= 1_000_000_000) {
  return Math.floor(num / 1_000_000_000 * 10) / 10 + "B";
}
  if (num >= 1_000_000) {
    return Math.floor(num / 1_000_000 * 10) / 10 + "M";
  }
  if (num >= 1000) {
    return Math.floor(num / 1000 * 10) / 10 + "K";
  }
  return num.toString();
}

function weightedPick(items){
  const total = items.reduce((s,it)=>s+it.rate, 0);
  let r = Math.random() * total;
  for(const it of items){
    if(r < it.rate) return it;
    r -= it.rate;
  }
  return items[items.length-1];
}

function gachaPull(poolKey, count) {
  const poolObj = GACHA_POOLS[poolKey];
  const pool = poolObj.pool;
  let cost = poolObj.cost || 100;
  cost = enforceMinCost(poolKey, cost);

  const MAX_DECK_SIZE = 100;

  let deck = JSON.parse(localStorage.getItem("deck") || "[]");
  let owned = JSON.parse(localStorage.getItem("ownedCards") || "[]");

  // ✅ โหลดเงินแบบเข้ารหัส
  let money = loadMoney();

  // ❌ ไม่รีเซ็ต ถ้า NaN จะให้มันแสดง NaN ไปเลย
  // console.log ใช้ตรวจสอบปัญหา
  if (isNaN(money)) {
    console.warn("⚠️ เงินที่โหลดมาเป็น NaN: ", localStorage.getItem("deckgame_money"));
  }

  let totalCost = cost * count;
  if (count === 3) totalCost = Math.floor(totalCost * 0.9);
  if (count === 10) totalCost = Math.floor(totalCost * 0.8);

  if (money < totalCost) {
    const shortage = totalCost - money;
    alert("💰 เงินไม่พอ! ขาดอีก " + shortage + "💰");
    return;
  }

  // ✅ หักเงินแล้วบันทึกด้วยระบบเข้ารหัส
  money -= totalCost;
  saveMoney(money);
  updateMoneyUI(money);

  const results = [];
  const blacklist = JSON.parse(localStorage.getItem("gacha_blacklist") || "[]");

  for (let i = 0; i < count; i++) {
    const card = structuredClone(weightedPick(pool));
    card.id = "card-" + Date.now() + "-" + Math.random();

    if (!owned.includes(card.name)) {
      owned.push(card.name);
    }

    if (blacklist.includes(card.name)) {
      card._blacklisted = true;
      results.push(card);

      if (owned.includes(card.name)) {
        switch (card.rarity) {
          case "Rare":      addToBag("memoryRare", 1); break;
          case "Epic":      addToBag("memoryEpic", 1); break;
          case "Legendary": addToBag("memoryLegendary", 1); break;
          case "Mythical":  addToBag("memoryMythical", 1); break;
          case "Cosmic":    addToBag("memoryCosmic", 1); break;
        }
      }
    } else {
      deck.push(card);
      results.push(card);

      if (owned.includes(card.name)) {
        const countSame = deck.filter(c => c.name === card.name).length;
        if (countSame > 1) {
          switch (card.rarity) {
            case "Rare":      addToBag("memoryRare", 1); break;
            case "Epic":      addToBag("memoryEpic", 1); break;
            case "Legendary": addToBag("memoryLegendary", 1); break;
            case "Mythical":  addToBag("memoryMythical", 1); break;
            case "Cosmic":    addToBag("memoryCosmic", 1); break;
          }
        }
      }
    }
  }

  localStorage.setItem("deck", JSON.stringify(deck));
  localStorage.setItem("ownedCards", JSON.stringify(owned));
  showPulledCards(results);
}

function sellCard(cardId, cardObj=null){
  let deck = JSON.parse(localStorage.getItem("deck") || "[]");
  let sold;

  if (cardObj){
    sold = cardObj;
  } else {
    const idx = deck.findIndex(c => c.id === cardId);
    if (idx === -1) return;
    sold = deck.splice(idx, 1)[0];
    localStorage.setItem("deck", JSON.stringify(deck));
  }

  const rarityPrice = {
  "Common": 100,
  "Rare": 300,
  "Epic": 2000,
  "Legendary": 30000,
  "Mythical": 100000,
  "Cosmic": 500000
};

  const stars = sold.stars || 1;
  const base = rarityPrice[sold.rarity] || 5;
  const price = base * stars;

  addMoney(price);
  

  if (typeof renderDeck === "function") renderDeck();
}
function showRates(poolKey){
  currentRatePool = poolKey;
  const pool = GACHA_POOLS[poolKey].pool;
  const grouped = pool.reduce((map, it)=>{
    if (!map[it.rarity]) map[it.rarity] = { rate: 0, chars: [] };
    map[it.rarity].rate += it.rate;
    map[it.rarity].chars.push(it);
    return map;
  }, {});

  let blacklist = JSON.parse(localStorage.getItem("gacha_blacklist") || "[]");

  // ⭐ กำหนดลำดับที่อยากให้แสดง
  const rarityOrder = ["Cosmic", "Mythical", "Legendary", "Epic", "Rare", "Common"];

  let html = "";
  for (const rarity of rarityOrder){
    if (!grouped[rarity]) continue; // ถ้า pool นี้ไม่มี rarity นั้นก็ข้าม
    const g = grouped[rarity];
    html += `
      <div class="rate-row ${rarity}">
        <span>${rarity}</span>
        <span>${g.rate.toFixed(2)}%</span>
      </div>
      <div class="char-grid">
        ${g.chars.map(c => `
          <div class="rarity-${c.rarity}" 
               style="cursor:pointer; ${blacklist.includes(c.name) ? 'text-decoration: line-through; color:red;' : ''}" 
               onclick="toggleBlacklist('${c.name}')">
            • ${c.name} ${blacklist.includes(c.name) ? '❌' : ''}
          </div>
        `).join("")}
      </div>
    `;
  }

  document.getElementById("rateDetails").innerHTML = html;
  document.getElementById("ratePopup").classList.remove("hidden");
  document.body.classList.add("no-scroll");
}
let currentRatePool = null; // ⭐ เก็บ poolKey ล่าสุดที่เปิดเรท

function toggleBlacklist(name){
  let blacklist = JSON.parse(localStorage.getItem("gacha_blacklist") || "[]");
  if (blacklist.includes(name)){
    blacklist = blacklist.filter(n => n !== name);
  } else {
    blacklist.push(name);
  }
  localStorage.setItem("gacha_blacklist", JSON.stringify(blacklist));

  if (currentRatePool) {
    showRates(currentRatePool);
  }


}

function closePopup(){
  document.getElementById("ratePopup").classList.add("hidden");

  // 🔓 ปลดล็อกการเลื่อน
  document.body.classList.remove("no-scroll");
}

document.addEventListener("DOMContentLoaded", renderGachaBoxes);

async function showPulledCards(cards) {
  const overlay = document.getElementById("gachaOverlay");
  const skipBtn = document.getElementById("skipButton");
  let skipped = false;

  // ✅ แสดง overlay ทุกครั้ง
  overlay.style.display = "flex";
  document.body.classList.add("no-scroll");

  // ✅ ลบ element การ์ดเก่าออก แต่ไม่ลบปุ่ม Skip
  Array.from(overlay.querySelectorAll(".gacha-fly-card, .gacha-static-card, .result-wrap"))
       .forEach(el => el.remove());

  function cleanupAndSell() {
    overlay.style.display = "none";
    Array.from(overlay.querySelectorAll(".gacha-fly-card, .gacha-static-card, .result-wrap"))
         .forEach(el => el.remove());
    skipBtn.classList.add("hidden");
    document.body.classList.remove("no-scroll");

    // ⭐ หลังจากปิด overlay → ขายการ์ด blacklist
    let deck = JSON.parse(localStorage.getItem("deck") || "[]");
    cards.forEach(c => {
      if (c._blacklisted) {
        const idx = deck.findIndex(d => d.id === c.id);
        if (idx !== -1) deck.splice(idx, 1);
        sellCard(c.id, c); // ใช้ฟังก์ชันขาย
      }
    });
    localStorage.setItem("deck", JSON.stringify(deck));
  }

  function renderAll() {
    // ลบผลลัพธ์เก่า
    Array.from(overlay.querySelectorAll(".gacha-fly-card, .gacha-static-card, .result-wrap"))
         .forEach(el => el.remove());

    const wrap = document.createElement("div");
    wrap.className = "result-wrap";
    wrap.style.display = "flex";
    wrap.style.flexDirection = "column";
    wrap.style.alignItems = "center";
    wrap.style.gap = "20px";
    wrap.style.marginTop = "30px";

    // === จัดลำดับความหายาก ===
    const rarityRank = { Cosmic: 6, Mythical: 5, Legendary: 4, Epic: 3, Rare: 2, Common: 1 };
    const sorted = [...cards].sort((a, b) => rarityRank[b.rarity] - rarityRank[a.rarity]);

    if (cards.length === 3) {
      // ⭐ ใบที่ดีที่สุด
      const best = sorted[0];
      const def = best.def ?? "?";
      const bestEl = document.createElement("div");
      bestEl.className = `gacha-static-card rarity-${best.rarity}`;
      bestEl.style.margin = "0 auto"; // ตรงกลาง
      bestEl.innerHTML = `
        <div style="font-size:18px">${best.name} ${best._blacklisted ? "❌" : ""}</div>
        <div>⭐ ${best.rarity}</div>
        <div style="font-size:12px">HP:${best.hp} ATK:${best.atk} DEF:${def}</div>
        <div style="font-size:12px">Skill: ${best.skill}</div>
      `;
      wrap.appendChild(bestEl);

      // ⭐ อีกสองใบล่าง
      const bottomRow = document.createElement("div");
      bottomRow.style.display = "flex";
      bottomRow.style.gap = "12px";
      bottomRow.style.justifyContent = "center";

      sorted.slice(1).forEach(card => {
        const def = card.def ?? "?";
        const el = document.createElement("div");
        el.className = `gacha-static-card rarity-${card.rarity}`;
        el.innerHTML = `
          <div style="font-size:16px">${card.name} ${card._blacklisted ? "❌" : ""}</div>
          <div>⭐ ${card.rarity}</div>
          <div style="font-size:12px">HP:${card.hp} ATK:${card.atk} DEF:${def}</div>
          <div style="font-size:12px">Skill: ${card.skill}</div>
        `;
        bottomRow.appendChild(el);
      });

      wrap.appendChild(bottomRow);
    } else {
      // ✅ layout เดิม (สำหรับ 1, 10 ใบ)
      const container = document.createElement("div");
      container.style.display = "grid";
      container.style.gridTemplateColumns = "repeat(auto-fit, minmax(160px, 1fr))";
      container.style.gap = "12px";
      container.style.justifyContent = "center";
      container.style.maxWidth = "500px";

      cards.forEach(card => {
        const def = card.def ?? "?";
        const el = document.createElement("div");
        el.className = `gacha-static-card rarity-${card.rarity}`;
        el.innerHTML = `
          <div style="font-size:16px">${card.name} ${card._blacklisted ? "❌" : ""}</div>
          <div>⭐ ${card.rarity}</div>
          <div style="font-size:12px">HP:${card.hp} ATK:${card.atk} DEF:${def}</div>
          <div style="font-size:12px">Skill: ${card.skill}</div>
        `;
        container.appendChild(el);
      });

      wrap.appendChild(container);
    }

    // ปุ่มปิด
      let closeBtn = overlay.querySelector(".close-btn");
    if (!closeBtn) {
      closeBtn = document.createElement("button");
      closeBtn.className = "close-btn";
      closeBtn.innerText = "ปิด";
      closeBtn.style.padding = "8px 16px";
      closeBtn.style.border = "none";
      closeBtn.style.borderRadius = "6px";
      closeBtn.style.background = "#607d8b";
      closeBtn.style.color = "white";
      closeBtn.style.fontWeight = "bold";
      closeBtn.style.cursor = "pointer";
      closeBtn.onclick = cleanupAndSell; // ⭐ ใช้ cleanup ที่ขายการ์ด blacklist
      wrap.appendChild(closeBtn);
    }

    overlay.appendChild(wrap);
  }

  skipBtn.onclick = () => {
    skipped = true;
    renderAll();
    skipBtn.classList.add("hidden");
  };

  // เล่นทีละการ์ด
  for (let i = 0; i < cards.length; i++) {
    if (skipped) break;

    const card = cards[i];
    const def = card.def ?? "?";
    const el = document.createElement("div");
    el.className = `gacha-fly-card rarity-${card.rarity}`;
    el.innerHTML = `
      <div style="font-size:18px">${card.name} ${card._blacklisted ? "❌" : ""}</div>
      <div>⭐ ${card.rarity}</div>
      <div style="font-size:12px">HP:${card.hp} ATK:${card.atk} DEF:${def}</div>
      <div style="font-size:12px">Skill: ${card.skill}</div>
    `;
    overlay.appendChild(el);

    if (i === 0) skipBtn.classList.remove("hidden");

    await new Promise(r => setTimeout(r, 1000));
    el.classList.add("fade-out");
    await new Promise(r => setTimeout(r, 200));
    el.remove();
  }

  if (!skipped) {
    setTimeout(() => {
      renderAll();
      skipBtn.classList.add("hidden");
    }, 200);
  }
}

</script>
</body>
</html>
