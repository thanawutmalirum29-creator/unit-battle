<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<title>Admin Console — UnitBattle</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="robots" content="noindex, nofollow" />
<link rel="stylesheet" href="../css/game.css" />
<link rel="stylesheet" href="../css/theme.css" />
<script src="../js/core/ui-popup.js"></script>
<style>
  /* admin-only additions — everything else borrows theme.css so this still
     looks like part of the same product instead of a bolted-on tool. */
  body{ max-width:900px; }
  #gateScreen{ max-width:340px; margin:80px auto 0; text-align:center; }
  #gateScreen input{ text-align:center; letter-spacing:4px; font-size:18px; }

  .adm-table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  .adm-table th{ text-align:left; color:var(--muted); font-weight:600; font-size:12px; padding:8px 6px; border-bottom:1px solid var(--border); }
  .adm-table td{ padding:10px 6px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .adm-table tr:last-child td{ border-bottom:none; }
  .adm-table tbody tr{ cursor:pointer; transition:background .12s; }
  .adm-table tbody tr:hover{ background:var(--panel-soft); }
  .adm-id{ font-family:monospace; font-size:11.5px; color:var(--muted); word-break:break-all; }
  .adm-chevron{ color:var(--muted); text-align:right; }
  .adm-badge{ font-size:11px; padding:2px 8px; border-radius:999px; white-space:nowrap; }
  .adm-badge.active{ background:rgba(16,185,129,.15); color:var(--good); }
  .adm-badge.suspended{ background:rgba(255,213,79,.15); color:var(--gold); }
  .adm-badge.banned{ background:rgba(239,68,68,.15); color:var(--bad); }
  .adm-badge.guest{ background:rgba(147,161,181,.18); color:var(--muted); border:1px solid rgba(147,161,181,.35); margin-left:6px; }
  .adm-badge.gold{ background:rgba(255,213,79,.18); color:var(--gold); border:1px solid rgba(255,213,79,.4); margin-left:6px; }
  .adm-toolbar{ display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
  .adm-toolbar input[type="text"]{ flex:1 1 220px; }

  #adminOverlay, #guildOverlay{
    display:none; position:fixed; inset:0; background:rgba(4,6,10,.72);
    align-items:flex-start; justify-content:center; padding:16px; z-index:90;
    overflow-y:auto;
  }
  #adminOverlay.open, #guildOverlay.open{ display:flex; }
  .adm-modal{ width:100%; max-width:460px; margin:24px auto; }
  .adm-modal-header{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; gap:8px; }
  .adm-modal-header button{ background:none; border:none; color:var(--muted); font-size:18px; padding:0; line-height:1; }
  .adm-modal-sub{ color:var(--muted); font-size:12px; margin-bottom:14px; }

  .adm-tabs{ display:flex; gap:4px; margin-bottom:14px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .adm-tab, .adm-gtab{ background:none; border:none; padding:8px 10px; font-size:12.5px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; }
  .adm-tab.active, .adm-gtab.active{ color:var(--text); border-bottom-color:var(--accent); font-weight:700; }
  .adm-tab.danger.active, .adm-gtab.danger.active{ color:#ffd5d5; border-bottom-color:var(--bad); }

  .adm-rank-card{ padding:10px; border-radius:10px; background:var(--panel-soft); border:1px solid var(--border); margin-bottom:8px; }
  .adm-rank-card-name{ font-weight:800; font-size:13.5px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .adm-rank-perm-list{ display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
  .adm-rank-perm-chip{ font-size:10.5px; padding:2px 7px; border-radius:999px; background:rgba(123,214,255,.12); color:var(--accent-2); border:1px solid rgba(123,214,255,.3); }
  .adm-rank-perm-chip.off{ background:rgba(255,255,255,.04); color:var(--muted); border-color:var(--border); text-decoration:line-through; }
  .adm-perm-check-list{ display:flex; flex-direction:column; gap:6px; margin-top:4px; }
  .adm-perm-check-list label{ display:flex; align-items:flex-start; gap:8px; font-size:12px; }
  .adm-perm-check-list input{ width:auto; margin-top:2px; }
  .adm-member-row{ display:flex; justify-content:space-between; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .adm-member-row:last-child{ border-bottom:none; }
  .adm-member-actions{ display:flex; gap:6px; flex-wrap:wrap; }
  .adm-member-actions select, .adm-member-actions button{ font-size:11.5px; padding:4px 7px; }

  .adm-field{ margin-bottom:12px; }
  .adm-field label{ display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  .adm-field input, .adm-field select, .adm-field textarea{ width:100%; }
  .adm-row2{ display:flex; gap:8px; }
  .adm-row2 > div{ flex:1; }
  .adm-hint{ font-size:11.5px; color:var(--muted); margin:-6px 0 12px; }
  .adm-section-title{ font-weight:700; font-size:13px; margin:0 0 8px; }
  .adm-divider{ border:none; border-top:1px solid var(--border); margin:16px 0; }

  .adm-overview-row{ display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .adm-overview-row:last-child{ border-bottom:none; }
  .adm-overview-row .label{ color:var(--muted); }

  .adm-mini-list{ max-height:160px; overflow-y:auto; border:1px solid var(--border); border-radius:var(--radius-sm); padding:6px 8px; margin-top:4px; }
  .adm-mini-item{ display:flex; justify-content:space-between; gap:8px; font-size:12.5px; padding:4px 0; border-bottom:1px solid var(--border); }
  .adm-mini-item:last-child{ border-bottom:none; }
  .adm-mini-empty{ color:var(--muted); font-size:12.5px; text-align:center; padding:10px 0; }

  #adminStatusMsg{ font-size:12px; color:var(--muted); margin-bottom:10px; }
  .adm-formmsg{ font-size:12px; margin-bottom:8px; display:none; }
  .adm-formmsg.error{ color:var(--bad); }
  .adm-formmsg.ok{ color:var(--good); }

  /* ---- visual polish: header + stat cards ---- */
  #consoleScreen .topbar{
    background:linear-gradient(135deg, rgba(92,139,255,.12), rgba(123,214,255,.05));
    border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 18px; margin-bottom:16px;
  }
  .adm-stats-row{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
  @media (min-width:560px){ .adm-stats-row{ grid-template-columns:repeat(4,1fr); } }
  .adm-stat-card{
    background:var(--panel-soft); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:12px 14px; text-align:center;
  }
  .adm-stat-value{ font-size:20px; font-weight:800; color:var(--text); }
  .adm-stat-card.gold .adm-stat-value{ color:var(--gold); }
  .adm-stat-card.warn .adm-stat-value{ color:var(--bad); }
  .adm-stat-card.good .adm-stat-value{ color:var(--good); }
  .adm-stat-label{ font-size:11px; color:var(--muted); margin-top:2px; }

  /* ---- table polish ---- */
  .adm-table tbody tr{ border-radius:8px; }
  .adm-table tbody tr:hover{ background:rgba(92,139,255,.07); }
  .adm-money{ font-weight:700; }
  .adm-money.negative{ color:var(--bad); }

  /* ---- reclaim warning box ---- */
  .adm-warn-box{
    background:rgba(255,213,79,.08); border:1px solid rgba(255,213,79,.3);
    color:#ffe6a8; border-radius:var(--radius-sm); padding:10px 12px;
    font-size:12px; line-height:1.6; margin-bottom:14px;
  }

  /* ---- shared "timeline" list (history tab + reclaim log) ---- */
  .adm-timeline{ display:flex; flex-direction:column; gap:6px; max-height:320px; overflow-y:auto; }
  .adm-timeline-item{
    display:flex; gap:10px; align-items:flex-start;
    background:var(--panel-soft); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:9px 10px;
  }
  .adm-timeline-icon{ font-size:16px; line-height:1.4; flex-shrink:0; }
  .adm-timeline-body{ flex:1; min-width:0; }
  .adm-timeline-top{ display:flex; justify-content:space-between; gap:8px; align-items:baseline; flex-wrap:wrap; }
  .adm-timeline-label{ font-size:13px; font-weight:600; }
  .adm-timeline-time{ font-size:11px; color:var(--muted); white-space:nowrap; }
  .adm-timeline-bits{ font-size:12px; color:var(--muted); margin-top:3px; }
  .adm-timeline-bits.muted{ font-style:italic; }

  .adm-tag{ display:inline-block; font-size:10.5px; padding:2px 7px; border-radius:999px; margin-right:4px; }
  .adm-tag.bad{ background:rgba(239,68,68,.15); color:#ff9d9d; }
  .adm-tag.warn{ background:rgba(255,213,79,.15); color:var(--gold); }
</style>
</head>
<body>

<div id="gateScreen">
  <h2><span class=gicon-shield></span> Admin Console</h2>
  <p class="muted">กรอกรหัสผ่านเพื่อเข้าใช้งาน</p>
  <form id="gateForm">
    <input type="password" id="gateCode" placeholder="รหัสผ่าน" autocomplete="off" autofocus />
    <div id="gateError" style="color:var(--bad);font-size:12px;margin-top:6px;display:none"></div>
    <button type="submit" style="width:100%;margin-top:10px">เข้าสู่ระบบ</button>
  </form>
</div>

<div id="consoleScreen" style="display:none">
  <header class="topbar">
    <h1><span class=gicon-shield></span> Admin Console</h1>
    <div class="right-group">
      <button id="adminLogoutBtn">ออกจากระบบ</button>
    </div>
  </header>

  <div class="adm-stats-row" id="adminStatsRow"></div>

  <section class="panel" id="pvpSeasonPanel">
    <div class="adm-modal-header" style="margin-bottom:10px;">
      <strong><span class=gicon-trophy></span> สมรภูมิจัดอันดับ (PvP)</strong>
      <button id="pvpRefreshBtn"><span class=gicon-refresh></span></button>
    </div>
    <div id="pvpSeasonStatus" class="adm-hint" style="margin:0 0 10px;">กำลังโหลด...</div>
    <div class="adm-toolbar" style="margin-bottom:0;">
      <button id="pvpStartSeasonBtn" style="display:none;">เปิดซีซั่นนี้เลย</button>
      <button id="pvpEndSeasonBtn" class="danger" style="display:none;">จบซีซั่นทันที (สรุปผล+แจกรางวัล)</button>
    </div>
    <div id="pvpSeasonFormMsg" class="adm-formmsg"></div>
  </section>

  <section class="panel" id="guildManagementPanel">
    <div class="adm-toolbar">
      <input type="text" id="guildSearch" placeholder="ค้นหากิลด์ด้วยชื่อหรือแท็ก" />
      <button id="guildRefreshBtn"><span class=gicon-refresh></span> รีเฟรช</button>
    </div>
    <div id="guildStatusMsg" class="adm-hint" style="margin:0 0 10px;">กำลังโหลด…</div>
    <div style="overflow-x:auto">
      <table class="adm-table">
        <thead>
          <tr>
            <th>กิลด์</th><th>หัวหน้า</th><th>เลเวล</th><th>สมาชิก</th><th><span class=gicon-coin></span> คลังกิลด์</th><th></th>
          </tr>
        </thead>
        <tbody id="guildTableBody"></tbody>
      </table>
    </div>
  </section>

  <section class="panel">
    <div class="adm-toolbar">
      <input type="text" id="adminSearch" placeholder="ค้นหาด้วยชื่อหรือ ID" />
      <button id="adminRefreshBtn"><span class=gicon-refresh></span> รีเฟรช</button>
    </div>
    <div id="adminStatusMsg"></div>
    <div style="overflow-x:auto">
      <table class="adm-table">
        <thead>
          <tr>
            <th>ผู้เล่น</th><th>Public ID</th><th>Internal ID</th><th><span class=gicon-coin></span> เงิน</th><th>สถานะ</th><th style="text-align:center">แอดมิน</th><th></th>
          </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>
  </section>
</div>

<!-- Player detail / management popup -->
<div id="adminOverlay">
  <div class="panel adm-modal" onclick="event.stopPropagation()">
    <div class="adm-modal-header">
      <div>
        <strong id="adminModalTitle">ผู้เล่น</strong>
        <div class="adm-modal-sub" id="adminModalSub"></div>
      </div>
      <button id="adminModalCloseBtn"><span class=gicon-x></span></button>
    </div>
    <div class="adm-tabs" id="adminTabs">
      <button class="adm-tab" data-tab="overview"> ภาพรวม</button>
      <button class="adm-tab" data-tab="history"><span class=gicon-note></span> ประวัติการรับของ</button>
      <button class="adm-tab" data-tab="edit"><span class=gicon-pencil></span> แก้ไข</button>
      <button class="adm-tab" data-tab="gift"><span class=gicon-gift></span> ส่งเมล / ไอเทม</button>
      <button class="adm-tab" data-tab="reclaim"><span class=gicon-arrow-left></span> เรียกคืน</button>
      <button class="adm-tab danger" data-tab="danger"><span class=gicon-trash></span> ลบบัญชี</button>
    </div>
    <div id="adminModalBody"></div>
  </div>
</div>

<!-- Guild detail / management popup — full leader authority from the console -->
<div id="guildOverlay">
  <div class="panel adm-modal" onclick="event.stopPropagation()">
    <div class="adm-modal-header">
      <div>
        <strong id="guildModalTitle">กิลด์</strong>
        <div class="adm-modal-sub" id="guildModalSub"></div>
      </div>
      <button id="guildModalCloseBtn"><span class=gicon-x></span></button>
    </div>
    <div class="adm-tabs" id="guildTabs">
      <button class="adm-gtab" data-gtab="overview">ภาพรวม</button>
      <button class="adm-gtab" data-gtab="members"><span class=gicon-user></span> สมาชิก</button>
      <button class="adm-gtab" data-gtab="ranks"><span class=gicon-star></span> ยศ</button>
      <button class="adm-gtab danger" data-gtab="danger"><span class=gicon-trash></span> ปิดกิลด์</button>
    </div>
    <div id="guildModalBody"></div>
  </div>
</div>

<script>
  const ADMIN_TOKEN_KEY = "adminToken";
  let players = [];
  let bagKeys = [];
  let catalog = { characters: [], equips: [] };
  let activePlayerId = null;
  let activeTab = "overview";
  let activePlayerDetail = null; // cached full detail (deck/equip/bag) for the open modal

  let guilds = [];
  let activeGuildId = null;
  let activeGuildTab = "overview";
  let activeGuildDetail = null; // cached { guild, members, ranks, permissionCatalog } for the open guild modal

  function getToken() { return sessionStorage.getItem(ADMIN_TOKEN_KEY); }
  function setToken(t) { sessionStorage.setItem(ADMIN_TOKEN_KEY, t); }
  function clearToken() { sessionStorage.removeItem(ADMIN_TOKEN_KEY); }

  async function adminFetch(path, options = {}) {
    const headers = Object.assign({ "Content-Type": "application/json" }, options.headers || {});
    const token = getToken();
    if (token) headers["Authorization"] = "Bearer " + token;
    const res = await fetch("/api/admin" + path, { ...options, headers });
    const data = await res.json().catch(() => null);
    if (res.status === 401) {
      clearToken();
      showGate("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่");
      throw new Error("unauthorized");
    }
    if (!res.ok) throw new Error(data?.error || `http ${res.status}`);
    return data;
  }

  function showGate(errorMsg) {
    document.getElementById("gateScreen").style.display = "block";
    document.getElementById("consoleScreen").style.display = "none";
    const errEl = document.getElementById("gateError");
    if (errorMsg) { errEl.textContent = errorMsg; errEl.style.display = "block"; }
    else { errEl.style.display = "none"; }
  }

  function showConsole() {
    document.getElementById("gateScreen").style.display = "none";
    document.getElementById("consoleScreen").style.display = "block";
    loadBagKeys();
    loadCatalog();
    loadPlayers();
    loadPvpSeason();
    loadGuilds();
  }

  // ---------------------------------------------------------------------
  // PvP Ranked Arena season control — see routes/admin.js (/pvp/season,
  // /pvp/season/start, /pvp/season/end) and routes/pvp.js for the freeze
  // window (last 4h before ends_at, attacks lock automatically — nothing
  // to do here for that part, it's fully server-side).
  // ---------------------------------------------------------------------
  async function loadPvpSeason() {
    const statusEl = document.getElementById("pvpSeasonStatus");
    const startBtn = document.getElementById("pvpStartSeasonBtn");
    const endBtn = document.getElementById("pvpEndSeasonBtn");
    statusEl.textContent = "กำลังโหลด...";
    startBtn.style.display = "none";
    endBtn.style.display = "none";
    try {
      const data = await adminFetch("/pvp/season");
      const s = data.season;
      if (s.status === "upcoming") {
        statusEl.innerHTML = `ซีซั่นที่ ${s.season_number} ยังไม่เปิด — ผู้เล่นจะเข้าโหมด PvP ไม่ได้จนกว่าจะกดเปิด`;
        startBtn.style.display = "";
      } else if (s.status === "active") {
        const ends = new Date(s.ends_at);
        statusEl.innerHTML = `ซีซั่นที่ ${s.season_number} กำลังแข่งขัน — สิ้นสุด ${ends.toLocaleString("th-TH")} (ปิดรับโจมตี 4 ชม.ก่อนหน้านั้นอัตโนมัติ) · ผู้เล่นในลีดเดอร์บอร์ด ${data.top.length} คน`;
        endBtn.style.display = "";
      } else {
        statusEl.textContent = `ซีซั่นที่ ${s.season_number}: ${s.status}`;
      }
    } catch (err) {
      statusEl.textContent = "โหลดไม่สำเร็จ: " + err.message;
    }
  }

  document.getElementById("pvpRefreshBtn").addEventListener("click", loadPvpSeason);

  document.getElementById("pvpStartSeasonBtn").addEventListener("click", async () => {
    const msg = document.getElementById("pvpSeasonFormMsg");
    msg.style.display = "none";
    if (!(await uiConfirm("เปิดซีซั่น PvP ตอนนี้เลยหรือไม่? ผู้เล่นทุกคนจะเริ่มโจมตีกันได้ทันที"))) return;
    try {
      await adminFetch("/pvp/season/start", { method: "POST" });
      msg.className = "adm-formmsg ok"; msg.textContent = "เปิดซีซั่นแล้ว"; msg.style.display = "block";
      loadPvpSeason();
    } catch (err) {
      msg.className = "adm-formmsg error"; msg.textContent = err.message; msg.style.display = "block";
    }
  });

  document.getElementById("pvpEndSeasonBtn").addEventListener("click", async () => {
    const msg = document.getElementById("pvpSeasonFormMsg");
    msg.style.display = "none";
    if (!(await uiConfirm("จบซีซั่นทันทีหรือไม่? ระบบจะสรุปผล แจกรางวัลทางเมล และเปิดซีซั่นถัดไปเป็น 'ยังไม่เริ่ม' ทันที — ยกเลิกไม่ได้"))) return;
    try {
      const r = await adminFetch("/pvp/season/end", { method: "POST" });
      msg.className = "adm-formmsg ok"; msg.textContent = `จบซีซั่นที่ ${r.endedSeason} แล้ว แจกรางวัลผู้เล่น ${r.playersRewarded} คน`; msg.style.display = "block";
      loadPvpSeason();
    } catch (err) {
      msg.className = "adm-formmsg error"; msg.textContent = err.message; msg.style.display = "block";
    }
  });

  document.getElementById("gateForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const code = document.getElementById("gateCode").value;
    try {
      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code }),
      });
      const data = await res.json().catch(() => null);
      if (!res.ok) throw new Error(data?.error || "เข้าสู่ระบบไม่สำเร็จ");
      setToken(data.token);
      showConsole();
    } catch (err) {
      document.getElementById("gateError").textContent = err.message;
      document.getElementById("gateError").style.display = "block";
    }
  });

  document.getElementById("adminLogoutBtn").addEventListener("click", async () => {
    try { await adminFetch("/logout", { method: "POST" }); } catch {}
    clearToken();
    showGate();
  });

  async function loadBagKeys() {
    try { bagKeys = await adminFetch("/bag-keys"); } catch { bagKeys = []; }
  }

  async function loadCatalog() {
    try { catalog = await adminFetch("/catalog"); } catch { catalog = { characters: [], equips: [] }; }
  }

  function statusLabel(s) {
    return s === "active" ? "ปกติ" : s === "suspended" ? "ระงับ" : "แบน";
  }

  async function loadPlayers() {
    const statusMsg = document.getElementById("adminStatusMsg");
    statusMsg.textContent = "กำลังโหลด…";
    try {
      const q = document.getElementById("adminSearch").value.trim();
      players = await adminFetch("/players" + (q ? `?q=${encodeURIComponent(q)}` : ""));
      renderTable();
      renderStatsRow();
      statusMsg.textContent = `บัญชีทั้งหมด ${players.length} รายการ`;
    } catch (err) {
      statusMsg.textContent = "โหลดไม่สำเร็จ: " + err.message;
    }
  }

  function renderStatsRow() {
    const el = document.getElementById("adminStatsRow");
    const active = players.filter((p) => p.status === "active").length;
    const flagged = players.length - active;
    const totalMoney = players.reduce((sum, p) => sum + (Number(p.money) || 0), 0);
    el.innerHTML = `
      <div class="adm-stat-card">
        <div class="adm-stat-value">${players.length}</div>
        <div class="adm-stat-label">บัญชีทั้งหมด</div>
      </div>
      <div class="adm-stat-card good">
        <div class="adm-stat-value">${active}</div>
        <div class="adm-stat-label">ใช้งานได้ปกติ</div>
      </div>
      <div class="adm-stat-card warn">
        <div class="adm-stat-value">${flagged}</div>
        <div class="adm-stat-label">ถูกระงับ/แบน</div>
      </div>
      <div class="adm-stat-card gold">
        <div class="adm-stat-value">${totalMoney.toLocaleString()}</div>
        <div class="adm-stat-label"><span class=gicon-coin></span> เงินรวมในระบบ</div>
      </div>
    `;
  }

  function renderTable() {
    const body = document.getElementById("adminTableBody");
    if (players.length === 0) {
      body.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:24px">ไม่พบบัญชี</td></tr>`;
      return;
    }
    body.innerHTML = players.map((p) => `
      <tr data-id="${p.id}">
        <td><strong>${escapeHtml(p.username)}</strong>${p.isGuest ? '<span class="adm-badge guest">ชั่วคราว</span>' : ''}</td>
        <td class="adm-id">${p.publicId || "-"}</td>
        <td class="adm-id">${p.id}</td>
        <td class="adm-money${p.money < 0 ? " negative" : ""}">${Number(p.money).toLocaleString()}</td>
        <td><span class="adm-badge ${p.status}">${statusLabel(p.status)}</span></td>
        <td style="text-align:center">
          <input type="checkbox" class="adm-admin-toggle" data-id="${p.id}" ${p.isAdmin ? "checked" : ""} title="ติ๊กเพื่อตั้งบัญชีนี้เป็นแอดมิน (ปลดล็อคทุกอย่างไม่จำกัด)" />
        </td>
        <td class="adm-chevron">›</td>
      </tr>
    `).join("");

    body.querySelectorAll("tr[data-id]").forEach((row) => {
      row.addEventListener("click", () => openPlayerModal(row.dataset.id));
    });

    body.querySelectorAll(".adm-admin-toggle").forEach((cb) => {
      cb.addEventListener("click", (e) => e.stopPropagation());
      cb.addEventListener("change", async (e) => {
        e.stopPropagation();
        const id = cb.dataset.id;
        const wantAdmin = cb.checked;
        const p = players.find((x) => x.id === id);
        const statusMsg = document.getElementById("adminStatusMsg");
        if (wantAdmin && !confirm(`ตั้งค่าบัญชี "${p ? p.username : id}" เป็นแอดมิน?\n\nจะได้รับ: เงิน/ทรัพยากรไม่จำกัด, ปลดล็อคทุกด่าน, ตัวละครครบทุกตัว (แม็กซ์เลเวล/ดาว), อุปกรณ์ลีเจ้นครบทุกชิ้น (ใส่แล้วไม่หาย), กรอบรูป/ฉายาทั้งหมด`)) {
          cb.checked = false;
          return;
        }
        cb.disabled = true;
        try {
          await adminFetch(`/players/${id}/admin-status`, {
            method: "PATCH",
            body: JSON.stringify({ isAdmin: wantAdmin }),
          });
          if (p) p.isAdmin = wantAdmin;
          statusMsg.textContent = wantAdmin
            ? `ตั้งค่าเป็นแอดมินแล้ว — ปลดล็อคสิทธิ์ทั้งหมดเรียบร้อย`
            : `ปลดสถานะแอดมินแล้ว (ของที่เคยได้รับจะไม่ถูกริบคืนอัตโนมัติ)`;
        } catch (err) {
          cb.checked = !wantAdmin;
          statusMsg.textContent = "เปลี่ยนสถานะแอดมินไม่สำเร็จ: " + err.message;
        } finally {
          cb.disabled = false;
        }
      });
    });
  }

  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s == null ? "" : s;
    return d.innerHTML;
  }

  document.getElementById("adminSearch").addEventListener("input", debounce(loadPlayers, 350));
  document.getElementById("adminRefreshBtn").addEventListener("click", loadPlayers);

  function debounce(fn, ms) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
  }

  // ------------------------------------------------------------------
  // Player popup — one modal, tabbed: overview / edit / gift / danger
  // ------------------------------------------------------------------
  async function openPlayerModal(id) {
    activePlayerId = id;
    activeTab = "overview";
    const p = players.find((x) => x.id === id);
    if (!p) return;

    document.getElementById("adminModalTitle").textContent = p.username;
    document.getElementById("adminModalSub").innerHTML =
      `Public ID: <span class="adm-id">${p.publicId || "-"}</span> · Internal ID: <span class="adm-id">${p.id}</span>`;
    document.getElementById("adminOverlay").classList.add("open");
    document.getElementById("adminModalBody").innerHTML = `<p class="muted" style="text-align:center;padding:20px 0">กำลังโหลด…</p>`;

    setActiveTab("overview");

    try {
      activePlayerDetail = await adminFetch(`/players/${id}`);
    } catch (err) {
      document.getElementById("adminModalBody").innerHTML = `<p style="color:var(--bad)">โหลดข้อมูลไม่สำเร็จ: ${escapeHtml(err.message)}</p>`;
      return;
    }
    renderTabBody();
  }

  function closeModal() {
    document.getElementById("adminOverlay").classList.remove("open");
    activePlayerId = null;
    activePlayerDetail = null;
  }
  document.getElementById("adminModalCloseBtn").addEventListener("click", closeModal);
  document.getElementById("adminOverlay").addEventListener("click", closeModal);

  document.getElementById("adminTabs").addEventListener("click", (e) => {
    const btn = e.target.closest(".adm-tab");
    if (!btn) return;
    setActiveTab(btn.dataset.tab);
    renderTabBody();
  });

  function setActiveTab(tab) {
    activeTab = tab;
    document.querySelectorAll(".adm-tab").forEach((b) => b.classList.toggle("active", b.dataset.tab === tab));
  }

  function renderTabBody() {
    const p = players.find((x) => x.id === activePlayerId);
    if (!p || !activePlayerDetail) return;
    const body = document.getElementById("adminModalBody");
    if (activeTab === "overview") body.innerHTML = overviewTabHtml(p, activePlayerDetail);
    if (activeTab === "edit") body.innerHTML = editTabHtml(p);
    if (activeTab === "gift") body.innerHTML = giftTabHtml(p);
    if (activeTab === "history") { body.innerHTML = historyTabHtml(); loadHistoryInto(activePlayerId); }
    if (activeTab === "reclaim") body.innerHTML = reclaimTabHtml(p);
    if (activeTab === "danger") body.innerHTML = dangerTabHtml(p);
    bindTabHandlers();
  }

  function bindTabHandlers() {
    if (activeTab === "edit") bindEditTab();
    if (activeTab === "gift") bindGiftTab();
    if (activeTab === "reclaim") bindReclaimTab();
    if (activeTab === "danger") bindDangerTab();
  }

  // ---- Overview ----
  function overviewTabHtml(p, d) {
    const created = d.createdAt ? new Date(d.createdAt).toLocaleString("th-TH") : "-";
    const deckRows = d.deck.length
      ? d.deck.map((c) => `<div class="adm-mini-item"><span>${escapeHtml(c.name)} <span class="muted">(${escapeHtml(c.rarity)})</span></span><span class="muted">Lv.${c.level || 1}</span></div>`).join("")
      : `<div class="adm-mini-empty">ไม่มีการ์ดในเด็ค</div>`;
    const equipRows = d.equipBag.length
      ? d.equipBag.map((it) => `<div class="adm-mini-item"><span>${escapeHtml(it.name)} <span class="muted">(${escapeHtml(it.rarity)})</span></span><span class="muted">${escapeHtml(it.type)}</span></div>`).join("")
      : `<div class="adm-mini-empty">ไม่มีอุปกรณ์ในกระเป๋า</div>`;
    const bagEntries = Object.entries(d.bag || {}).filter(([, qty]) => Number(qty) !== 0);
    const bagRows = bagEntries.length
      ? bagEntries.map(([key, qty]) => {
          const neg = Number(qty) < 0;
          return `<div class="adm-mini-item"><span>${escapeHtml(key)}</span><span class="${neg ? "adm-money negative" : ""}">${Number(qty).toLocaleString()}${neg ? " (หนี้)" : ""}</span></div>`;
        }).join("")
      : `<div class="adm-mini-empty">ไม่มีทรัพยากรสะสม</div>`;
    const moneyNeg = Number(d.money) < 0;

    const statusDetailRows = [];
    if (p.status === 'suspended' || p.status === 'banned') {
      const reasonText = p.statusReason ? escapeHtml(p.statusReason) : '<span class="muted">ไม่ระบุเหตุผล</span>';
      statusDetailRows.push(`<div class="adm-overview-row"><span class="label">เหตุผล</span><span>${reasonText}</span></div>`);
      if (p.statusChangedAt) {
        statusDetailRows.push(`<div class="adm-overview-row"><span class="label">${p.status === 'banned' ? 'แบนเมื่อ' : 'ระงับตั้งแต่'}</span><span>${new Date(p.statusChangedAt).toLocaleString("th-TH")}</span></div>`);
      }
      if (p.status === 'suspended' && p.suspendedUntil) {
        const until = new Date(p.suspendedUntil);
        const daysLeft = Math.max(0, Math.ceil((until.getTime() - Date.now()) / (24 * 60 * 60 * 1000)));
        statusDetailRows.push(`<div class="adm-overview-row"><span class="label">ถึงวันที่</span><span>${until.toLocaleString("th-TH")} (เหลืออีก ${daysLeft} วัน)</span></div>`);
      }
      if (p.status === 'banned') {
        statusDetailRows.push(`<div class="adm-overview-row"><span class="label">ระยะเวลา</span><span>ถาวร จนกว่าแอดมินจะปลดแบน</span></div>`);
      }
    }

    return `
      <div class="adm-overview-row"><span class="label">สถานะ</span><span class="adm-badge ${p.status}">${statusLabel(p.status)}</span></div>
      <div class="adm-overview-row"><span class="label">ประเภทบัญชี</span><span>${p.isGuest ? '<span class="adm-badge guest">ชั่วคราว (ไม่มี PIN)</span>' : 'ปกติ'}${p.isAdmin ? ' <span class="adm-badge gold">แอดมิน (ไม่จำกัด)</span>' : ''}</span></div>
      ${statusDetailRows.join("")}
      <div class="adm-overview-row"><span class="label">สมัครเมื่อ</span><span>${created}</span></div>
      <div class="adm-overview-row"><span class="label"><span class=gicon-coin></span> เงิน</span><span class="${moneyNeg ? "adm-money negative" : ""}">${Number(d.money).toLocaleString()}${moneyNeg ? " (ติดลบ/เป็นหนี้)" : ""}</span></div>
      <div class="adm-overview-row"><span class="label"><span class=gicon-card></span> การ์ดในเด็ค</span><span>${d.deck.length}</span></div>
      <div class="adm-overview-row"><span class="label"><span class=gicon-shield></span> อุปกรณ์ในกระเป๋า</span><span>${d.equipBag.length}</span></div>
      <hr class="adm-divider" />
      <div class="adm-section-title"><span class=gicon-box></span> ทรัพยากรสะสม</div>
      <div class="adm-mini-list">${bagRows}</div>
      <div class="adm-section-title" style="margin-top:12px"><span class=gicon-card></span> เด็คปัจจุบัน</div>
      <div class="adm-mini-list">${deckRows}</div>
      <div class="adm-section-title" style="margin-top:12px"><span class=gicon-shield></span> กระเป๋าอุปกรณ์</div>
      <div class="adm-mini-list">${equipRows}</div>
    `;
  }

  // ---- Edit (rename / status) ----
  function editTabHtml(p) {
    return `
      <div class="adm-field">
        <label>ชื่อบัญชี</label>
        <input type="text" id="editUsername" value="${escapeHtml(p.username)}" />
      </div>
      <div class="adm-field">
        <label>สถานะ</label>
        <select id="editStatus">
          <option value="active" ${p.status === "active" ? "selected" : ""}>ปกติ</option>
          <option value="suspended" ${p.status === "suspended" ? "selected" : ""}>ระงับการใช้งานชั่วคราว</option>
          <option value="banned" ${p.status === "banned" ? "selected" : ""}>แบน (ถาวร)</option>
        </select>
      </div>
      <div class="adm-field" id="editDaysField" style="display:none">
        <label>ระงับกี่วัน</label>
        <input type="number" id="editDays" min="1" max="3650" step="1" placeholder="เช่น 7" value="${p.status === "suspended" && p.suspendedUntil ? Math.max(1, Math.ceil((new Date(p.suspendedUntil).getTime() - Date.now()) / 86400000)) : ""}" />
      </div>
      <div class="adm-field" id="editReasonField" style="display:none">
        <label>เหตุผล</label>
        <input type="text" id="editReason" maxlength="500" placeholder="เช่น โกงเกม / คำพูดไม่เหมาะสม" value="${p.statusReason ? escapeHtml(p.statusReason) : ""}" />
      </div>
      <div id="editMsg" class="adm-formmsg"></div>
      <button id="editSaveBtn" style="width:100%">บันทึกการเปลี่ยนแปลง</button>
    `;
  }

  function bindEditTab() {
    const statusSelect = document.getElementById("editStatus");
    const daysField = document.getElementById("editDaysField");
    const reasonField = document.getElementById("editReasonField");

    function syncFieldVisibility() {
      const v = statusSelect.value;
      daysField.style.display = v === "suspended" ? "block" : "none";
      reasonField.style.display = (v === "suspended" || v === "banned") ? "block" : "none";
    }
    statusSelect.addEventListener("change", syncFieldVisibility);
    syncFieldVisibility();

    document.getElementById("editSaveBtn").addEventListener("click", async () => {
      const username = document.getElementById("editUsername").value.trim();
      const status = statusSelect.value;
      const reason = document.getElementById("editReason").value.trim();
      const daysRaw = document.getElementById("editDays").value;
      const msgEl = document.getElementById("editMsg");

      if (status === "suspended" && (!daysRaw || Number(daysRaw) <= 0)) {
        msgEl.className = "adm-formmsg error";
        msgEl.textContent = "กรุณาระบุจำนวนวันที่จะระงับ";
        msgEl.style.display = "block";
        return;
      }

      const body = { username, status };
      if (status === "suspended") {
        body.days = Number(daysRaw);
        body.reason = reason || undefined;
      } else if (status === "banned") {
        body.reason = reason || undefined;
      }

      try {
        await adminFetch(`/players/${activePlayerId}`, {
          method: "PATCH",
          body: JSON.stringify(body),
        });
        msgEl.className = "adm-formmsg ok";
        msgEl.textContent = "บันทึกแล้ว";
        msgEl.style.display = "block";
        await loadPlayers();
        const p = players.find((x) => x.id === activePlayerId);
        if (p) {
          document.getElementById("adminModalTitle").textContent = p.username;
        }
      } catch (err) {
        msgEl.className = "adm-formmsg error";
        msgEl.textContent = err.message;
        msgEl.style.display = "block";
      }
    });
  }

  // ---- Gift: mail + money + bag item + character + equipment, all in one send ----
  function giftTabHtml(p) {
    const bagOptions = bagKeys.map((k) => `<option value="${k}">${k}</option>`).join("");
    const charOptions = catalog.characters
      .slice().sort((a, b) => a.name.localeCompare(b.name))
      .map((c) => `<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)} — ${escapeHtml(c.rarity)}</option>`).join("");
    const equipOptions = catalog.equips
      .slice().sort((a, b) => a.name.localeCompare(b.name))
      .map((e) => `<option value="${escapeHtml(e.name)}">${escapeHtml(e.name)} — ${escapeHtml(e.rarity)} (${escapeHtml(e.type)})</option>`).join("");

    return `
      <div class="adm-field">
        <label>หัวข้อ</label>
        <input type="text" id="mailSubject" placeholder="เช่น รางวัลกิจกรรม" />
      </div>
      <div class="adm-field">
        <label>ข้อความ</label>
        <textarea id="mailBody" rows="3"></textarea>
      </div>

      <div class="adm-section-title">แนบของรางวัล (เลือกได้หลายอย่าง ไม่บังคับ)</div>

      <div class="adm-row2">
        <div class="adm-field">
          <label><span class=gicon-coin></span> เงิน</label>
          <input type="number" id="mailMoney" value="0" min="0" />
        </div>
      </div>
      <div class="adm-row2">
        <div class="adm-field">
          <label>ไอเทมทรัพยากร</label>
          <select id="mailBagKey">
            <option value="">— ไม่แนบ —</option>
            ${bagOptions}
          </select>
        </div>
        <div class="adm-field">
          <label>จำนวน</label>
          <input type="number" id="mailBagQty" value="0" min="0" />
        </div>
      </div>
      <div class="adm-field">
        <label><span class=gicon-user></span>‍<span class=gicon-handshake></span>‍<span class=gicon-user></span> ส่งตัวละคร</label>
        <select id="mailCard">
          <option value="">— ไม่แนบ —</option>
          ${charOptions}
        </select>
      </div>
      <div class="adm-hint">ตัวละครจะเข้าเด็คของผู้เล่นเป็น Lv.1 ทันทีที่กดรับเมล</div>
      <div class="adm-field">
        <label><span class=gicon-sword></span> ส่งอุปกรณ์</label>
        <select id="mailEquip">
          <option value="">— ไม่แนบ —</option>
          ${equipOptions}
        </select>
      </div>
      <div class="adm-hint">อุปกรณ์จะเข้ากระเป๋าอุปกรณ์ของผู้เล่นทันทีที่กดรับเมล</div>

      <div id="mailMsg" class="adm-formmsg"></div>
      <button id="mailSendBtn" style="width:100%">ส่งเมล</button>
    `;
  }

  function bindGiftTab() {
    document.getElementById("mailSendBtn").addEventListener("click", async () => {
      const subject = document.getElementById("mailSubject").value.trim();
      const body = document.getElementById("mailBody").value.trim();
      const money = Number(document.getElementById("mailMoney").value) || 0;
      const bagKey = document.getElementById("mailBagKey").value || null;
      const bagQty = Number(document.getElementById("mailBagQty").value) || 0;
      const cardName = document.getElementById("mailCard").value || null;
      const equipName = document.getElementById("mailEquip").value || null;
      const msgEl = document.getElementById("mailMsg");

      if (!subject) {
        msgEl.className = "adm-formmsg error";
        msgEl.textContent = "กรุณากรอกหัวข้อ";
        msgEl.style.display = "block";
        return;
      }

      const sendBtn = document.getElementById("mailSendBtn");
      sendBtn.disabled = true;
      sendBtn.textContent = "กำลังส่ง…";
      try {
        await adminFetch(`/players/${activePlayerId}/mail`, {
          method: "POST",
          body: JSON.stringify({ subject, body, money, bagKey, bagQty, cardName, equipName }),
        });
        msgEl.className = "adm-formmsg ok";
        msgEl.innerHTML = "ส่งเมลแล้ว <span class=gicon-check></span>";
        msgEl.style.display = "block";
        document.getElementById("mailSubject").value = "";
        document.getElementById("mailBody").value = "";
        document.getElementById("mailMoney").value = "0";
        document.getElementById("mailBagKey").value = "";
        document.getElementById("mailBagQty").value = "0";
        document.getElementById("mailCard").value = "";
        document.getElementById("mailEquip").value = "";
      } catch (err) {
        msgEl.className = "adm-formmsg error";
        msgEl.textContent = err.message;
        msgEl.style.display = "block";
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "ส่งเมล";
      }
    });
  }

  // ---- History: unified "received items" timeline (rewards / claimed mail / shop) ----
  function historyTabHtml() {
    return `
      <div class="adm-section-title"><span class=gicon-note></span> ประวัติการรับของ (ล่าสุดก่อน)</div>
      <div class="adm-hint">รวมของรางวัลจากการผ่านด่าน/บอส, เมลที่กดรับแล้ว, และการซื้อจากร้านค้า</div>
      <div id="historyList" class="adm-timeline"><p class="adm-mini-empty">กำลังโหลด…</p></div>
    `;
  }

  function historyTypeIcon(type) {
    return type === "reward" ? "<span class=gicon-battle></span>" : type === "mail" ? "<span class=gicon-mailbox></span>" : type === "shop" ? "<span class=gicon-store></span>" : "•";
  }

  // best-effort stringify for items_awarded (shape is a plain {bagKey: qty} object —
  // see STAGE_DROPS in public/js/core/drops.js — but kept defensive since the column
  // is untyped JSONB)
  function summarizeItems(items) {
    try {
      if (Array.isArray(items)) return items.map((it) => it.key || it.name || JSON.stringify(it)).join(", ");
      if (items && typeof items === "object") return Object.entries(items).map(([k, v]) => `${k} × ${v}`).join(", ");
    } catch {}
    return "";
  }

  function historyEventHtml(e) {
    const time = e.at ? new Date(e.at).toLocaleString("th-TH") : "-";
    const bits = [];
    if (e.money) bits.push(`<span class=gicon-coin></span> ${Number(e.money).toLocaleString()}`);
    if (e.bagKey && e.bagQty) bits.push(`${escapeHtml(e.bagKey)} × ${e.bagQty}`);
    if (e.card) bits.push(`<span class=gicon-user></span>‍<span class=gicon-handshake></span>‍<span class=gicon-user></span> ${escapeHtml(e.card.name)} (${escapeHtml(e.card.rarity)})`);
    if (e.equip) bits.push(`<span class=gicon-sword></span> ${escapeHtml(e.equip.name)} (${escapeHtml(e.equip.rarity)})`);
    if (e.items) { const s = summarizeItems(e.items); if (s) bits.push(`<span class=gicon-gift></span> ${s}`); }
    if (e.pricePaid !== undefined) {
      bits.push(e.paidWith === "shard" ? `จ่ายด้วย ${escapeHtml(e.shardKey || "")} × ${e.shardQty}` : `จ่าย <span class=gicon-coin></span> ${Number(e.pricePaid).toLocaleString()}`);
    }
    return `
      <div class="adm-timeline-item">
        <div class="adm-timeline-icon">${historyTypeIcon(e.type)}</div>
        <div class="adm-timeline-body">
          <div class="adm-timeline-top">
            <span class="adm-timeline-label">${escapeHtml(e.label)}</span>
            <span class="adm-timeline-time">${time}</span>
          </div>
          ${bits.length ? `<div class="adm-timeline-bits">${bits.join(" · ")}</div>` : ""}
        </div>
      </div>
    `;
  }

  async function loadHistoryInto(forPlayerId) {
    let events;
    try {
      events = await adminFetch(`/players/${forPlayerId}/history`);
    } catch (err) {
      if (activeTab === "history" && activePlayerId === forPlayerId) {
        const el = document.getElementById("historyList");
        if (el) el.innerHTML = `<p style="color:var(--bad)">โหลดไม่สำเร็จ: ${escapeHtml(err.message)}</p>`;
      }
      return;
    }

  function reclaimResultMessage(r) {
    let msg = `เรียกคืนแล้ว: ${r.label}`;
    if (r.convertedToMoney) msg += ` (หักเงินแทนบางส่วน ${Number(r.moneyDeducted).toLocaleString()})`;
    if (r.wentNegative) msg += ` — <span class=gicon-warning></span> ยอดติดลบ/เป็นหนี้แล้ว`;
    msg += ` · แจ้งผู้เล่นทางกล่องจดหมายแล้ว <span class=gicon-check></span>`;
    return msg;
  }

  function bindReclaimTab() {
    const kindSel = document.getElementById("reclaimKind");
    const fieldsEl = document.getElementById("reclaimFields");
    fieldsEl.innerHTML = reclaimFieldsHtml(kindSel.value);
    kindSel.addEventListener("change", () => { fieldsEl.innerHTML = reclaimFieldsHtml(kindSel.value); });

    document.getElementById("reclaimSubmitBtn").addEventListener("click", async () => {
      const kind = kindSel.value;
      const msgEl = document.getElementById("reclaimMsg");
      const note = document.getElementById("reclaimNote").value.trim();
      const body = { kind, note };

      if (kind === "money") {
        body.amount = Number(document.getElementById("reclaimAmount").value);
      } else if (kind === "bag") {
        body.bagKey = document.getElementById("reclaimBagKey").value;
        body.amount = Number(document.getElementById("reclaimAmount").value);
      } else if (kind === "card") {
        body.cardName = document.getElementById("reclaimCardName").value;
        body.qty = Number(document.getElementById("reclaimQty").value);
      } else if (kind === "equip") {
        body.equipName = document.getElementById("reclaimEquipName").value;
        body.qty = Number(document.getElementById("reclaimQty").value);
      }

      const p = players.find((x) => x.id === activePlayerId);
      if (!(await uiConfirm(`ยืนยันเรียกคืนจากบัญชี "${p ? p.username : ""}"?`))) return;

      const submitBtn = document.getElementById("reclaimSubmitBtn");
      submitBtn.disabled = true;
      submitBtn.textContent = "กำลังเรียกคืน…";
      try {
        const result = await adminFetch(`/players/${activePlayerId}/reclaim`, {
          method: "POST",
          body: JSON.stringify(body),
        });
        msgEl.className = "adm-formmsg ok";
        msgEl.textContent = reclaimResultMessage(result);
        msgEl.style.display = "block";

        // sync cached detail + table row so overview/list reflect the new balance right away
        if (activePlayerDetail) {
          activePlayerDetail.money = result.money;
          activePlayerDetail.bag = result.bag;
          activePlayerDetail.deck = result.deck;
          activePlayerDetail.equipBag = result.equipBag;
        }
        const row = players.find((x) => x.id === activePlayerId);
        if (row) { row.money = result.money; renderTable(); renderStatsRow(); }

        loadReclaimLogInto(activePlayerId);
      } catch (err) {
        msgEl.className = "adm-formmsg error";
        msgEl.textContent = err.message;
        msgEl.style.display = "block";
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = "<span class=gicon-arrow-left></span> เรียกคืน";
      }
    });

    loadReclaimLogInto(activePlayerId);
  }

  function reclaimKindIcon(k) {

  async function loadReclaimLogInto(forPlayerId) {
    let rows;
    try {
      rows = await adminFetch(`/players/${forPlayerId}/reclaims`);

      if (activeTab === "reclaim" && activePlayerId === forPlayerId) {
        const el = document.getElementById("reclaimHistoryList");
        if (el) el.innerHTML = `<p style="color:var(--bad)">โหลดไม่สำเร็จ: ${escapeHtml(err.message)}</p>`;

    }
    if (!(activeTab === "reclaim" && activePlayerId === forPlayerId)) return;
    const el = document.getElementById("reclaimHistoryList");
    if (!el) return;
    el.innerHTML = rows.length
      ? rows.map(reclaimLogItemHtml).join("")
      : `<p class="adm-mini-empty">ยังไม่เคยเรียกคืนอะไรจากบัญชีนี้</p>`;

  async function loadGuilds() {
    const statusMsg = document.getElementById("guildStatusMsg");
    statusMsg.textContent = "กำลังโหลด…";
    try {
      const q = document.getElementById("guildSearch").value.trim();
      guilds = await adminFetch("/guilds" + (q ? `?q=${encodeURIComponent(q)}` : ""));
      renderGuildsTable();
      statusMsg.textContent = `กิลด์ทั้งหมด ${guilds.length} กิลด์`;
    } catch (err) {
      statusMsg.textContent = "โหลดไม่สำเร็จ: " + err.message;
    }
  }
  document.getElementById("guildSearch").addEventListener("input", debounce(loadGuilds, 350));
  document.getElementById("guildRefreshBtn").addEventListener("click", loadGuilds);

  function renderGuildsTable() {
    const body = document.getElementById("guildTableBody");
    if (guilds.length === 0) {
      body.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">ไม่พบกิลด์</td></tr>`;
      return;
    }
    body.innerHTML = guilds.map((g) => `
      <tr data-id="${g.id}">
        <td><strong>[${escapeHtml(g.tag)}] ${escapeHtml(g.name)}</strong></td>
        <td>${escapeHtml(g.leaderUsername)}</td>
        <td>Lv.${g.level}</td>
        <td>${g.memberCount}/${g.maxMembers}</td>
        <td class="adm-money">${g.treasuryMoney.toLocaleString()}</td>
        <td class="adm-chevron">›</td>
      </tr>
    `).join("");
    body.querySelectorAll("tr[data-id]").forEach((row) => {
      row.addEventListener("click", () => openGuildModal(row.dataset.id));
    });
  }

  async function openGuildModal(id) {
    activeGuildId = id;
    activeGuildTab = "overview";
    document.getElementById("guildOverlay").classList.add("open");
    document.getElementById("guildModalBody").innerHTML = `<p class="muted" style="text-align:center;padding:20px 0">กำลังโหลด…</p>`;
    setActiveGuildTab("overview");
    try {
      activeGuildDetail = await adminFetch(`/guilds/${id}`);
    } catch (err) {
      document.getElementById("guildModalBody").innerHTML = `<p style="color:var(--bad)">โหลดข้อมูลไม่สำเร็จ: ${escapeHtml(err.message)}</p>`;
      return;
    }
    const g = activeGuildDetail.guild;
    document.getElementById("guildModalTitle").textContent = `[${g.tag}] ${g.name}`;
    document.getElementById("guildModalSub").innerHTML =
      `หัวหน้า: ${escapeHtml(g.leaderUsername)} · สมาชิก ${activeGuildDetail.members.length}/${g.maxMembers} · <span class="adm-id">${g.id}</span>`;
    renderGuildTabBody();
  }

  function closeGuildModal() {
    document.getElementById("guildOverlay").classList.remove("open");
    activeGuildId = null;
    activeGuildDetail = null;
  }
  document.getElementById("guildModalCloseBtn").addEventListener("click", closeGuildModal);
  document.getElementById("guildOverlay").addEventListener("click", closeGuildModal);

  document.getElementById("guildTabs").addEventListener("click", (e) => {
    const btn = e.target.closest(".adm-gtab");
    if (!btn) return;
    setActiveGuildTab(btn.dataset.gtab);
    renderGuildTabBody();
  });

  function setActiveGuildTab(tab) {
    activeGuildTab = tab;
    document.querySelectorAll(".adm-gtab").forEach((b) => b.classList.toggle("active", b.dataset.gtab === tab));
  }

    return `<div id="${id}" class="adm-formmsg"></div>`;

  function showGuildFormMsg(id, ok, text) {
    const el = document.getElementById(id);

    el.className = "adm-formmsg " + (ok ? "ok" : "error");
    el.textContent = text;
    el.style.display = "block";

      document.querySelectorAll("#gEmblemPicker .emblem-opt").forEach((el) => {
        const sel = el.dataset.emblem === selectedEmblem;
        el.classList.toggle("sel", sel);
        el.style.background = sel ? "linear-gradient(135deg,var(--accent),#3f63d6)" : "";
      });
    });

    document.getElementById("gSaveOverviewBtn").addEventListener("click", async () => {

        name: document.getElementById("gEditName").value.trim(),
        tag: document.getElementById("gEditTag").value.trim(),
        description: document.getElementById("gEditDesc").value.trim(),
        emblem: selectedEmblem,
        joinMode: document.getElementById("gEditJoinMode").value,
        level: Number(document.getElementById("gEditLevel").value),
        exp: Number(document.getElementById("gEditExp").value),
        treasuryMoney: Number(document.getElementById("gEditTreasury").value),
        extraCapacityPurchased: document.getElementById("gEditExtraCap").checked,
      };
      btn.disabled = true;
      try {
        const r = await adminFetch(`/guilds/${activeGuildId}`, { method: "PATCH", body: JSON.stringify(payload) });
        showGuildFormMsg("gOverviewMsg", true, "บันทึกแล้ว");
        activeGuildDetail.guild = { ...activeGuildDetail.guild, ...r.guild };
        const listRow = guilds.find((x) => x.id === activeGuildId);
        if (listRow) Object.assign(listRow, r.guild);
        renderGuildsTable();
        document.getElementById("guildModalTitle").textContent = `[${r.guild.tag}] ${r.guild.name}`;
      } catch (err) {
        showGuildFormMsg("gOverviewMsg", false, err.message);
      } finally {
        btn.disabled = false;
      }
    });

  // ---- สมาชิก: เลื่อน/ปลด/เตะ/โอนหัวหน้า/มอบยศ ----
  function guildRoleLabelAdm(role) {
    if (role === "leader") return '<span class="role-pill role-leader" style="font-size:10px;padding:1px 6px">หัวหน้า</span>';
    if (role === "officer") return '<span class="role-pill role-officer" style="font-size:10px;padding:1px 6px">รองหัวหน้า</span>';
    return '<span class="role-pill role-member" style="font-size:10px;padding:1px 6px">สมาชิก</span>';
  }

  function guildMembersTabHtml() {
    const ranks = activeGuildDetail.ranks || [];
    const rankOptions = ranks.map((r) => `<option value="${r.id}">${escapeHtml(r.name)} (${r.rankPoints})</option>`).join("");
    const rows = activeGuildDetail.members.map((m) => `
      <div class="adm-member-row" data-player="${m.playerId}">
        <div>
          <strong style="font-size:13px">${escapeHtml(m.username)}</strong>
          ${guildRoleLabelAdm(m.role)}
          ${m.rankName ? `<span class="rank-pill" style="font-size:10px;padding:1px 6px">${escapeHtml(m.rankName)}</span>` : ""}
          <span class="adm-hint" style="margin:0">แต้มยศ ${m.rankPoints}</span>
          <div class="adm-hint" style="margin:2px 0 0">แต้มบริจาค ${Number(m.contributionLifetime).toLocaleString()} · ดาเมจบอส ${Number(m.bossDamageCycle).toLocaleString()}</div>
        </div>
        <div class="adm-member-actions">
          ${m.role === "member" ? `<button data-act="promote" data-id="${m.playerId}">เลื่อนรองหัวหน้า</button>` : ""}
          ${m.role === "officer" ? `<button data-act="demote" data-id="${m.playerId}">ปลดรองหัวหน้า</button>` : ""}
          ${m.role !== "leader" ? `<button data-act="transfer" data-id="${m.playerId}">โอนหัวหน้า</button>` : ""}
          ${ranks.length > 0 && m.role !== "leader" ? `
            <select data-act="rank" data-id="${m.playerId}">
              <option value="">${m.rankName ? "เปลี่ยนยศ..." : "มอบยศ..."}</option>
              ${rankOptions}
              ${m.rankName ? `<option value="__clear__">— ถอดยศ —</option>` : ""}
            </select>` : ""}
          ${m.role !== "leader" ? `<button class="danger" data-act="kick" data-id="${m.playerId}">เตะออก</button>` : ""}
        </div>
      </div>
    `).join("");
    return `${guildFormMsgHtml("gMembersMsg")}${rows || '<p class="adm-mini-empty">ไม่มีสมาชิก</p>'}`;
  }

  async function guildMemberAction(action, playerId, extra) {
    try {
      if (action === "promote") await adminFetch(`/guilds/${activeGuildId}/members/${playerId}/role`, { method: "POST", body: JSON.stringify({ role: "officer" }) });
      else if (action === "demote") await adminFetch(`/guilds/${activeGuildId}/members/${playerId}/role`, { method: "POST", body: JSON.stringify({ role: "member" }) });
      else if (action === "kick") {
        if (!(await uiConfirm("ยืนยันเตะสมาชิกคนนี้ออกจากกิลด์?"))) return;
        await adminFetch(`/guilds/${activeGuildId}/members/${playerId}/kick`, { method: "POST" });
      } else if (action === "transfer") {
        if (!(await uiConfirm("ยืนยันโอนตำแหน่งหัวหน้ากิลด์ให้สมาชิกคนนี้?"))) return;
        await adminFetch(`/guilds/${activeGuildId}/transfer-leadership`, { method: "POST", body: JSON.stringify({ playerId }) });
      } else if (action === "rank") {
        const rankId = extra === "__clear__" ? null : (extra || null);
        await adminFetch(`/guilds/${activeGuildId}/members/${playerId}/rank`, { method: "POST", body: JSON.stringify({ rankId }) });
      }
      activeGuildDetail = await adminFetch(`/guilds/${activeGuildId}`);
      renderGuildTabBody();
      const listRow = guilds.find((x) => x.id === activeGuildId);
      if (listRow) { listRow.memberCount = activeGuildDetail.members.length; }
      renderGuildsTable();
    } catch (err) {
      showGuildFormMsg("gMembersMsg", false, err.message);
    }
  }

  function bindGuildMembersTab() {
    const body = document.getElementById("guildModalBody");
    body.querySelectorAll("button[data-act]").forEach((btn) => {
      btn.addEventListener("click", () => guildMemberAction(btn.dataset.act, btn.dataset.id));
    });
    body.querySelectorAll("select[data-act='rank']").forEach((sel) => {
      sel.addEventListener("change", () => {
        if (!sel.value) return;
        guildMemberAction("rank", sel.dataset.id, sel.value);
      });
    });
  }

  // ---- ยศ: ระบบสร้างยศเองของหัวหน้ากิลด์ (แอดมินทำแทนได้ทุกกิลด์) ----
  let _admSelectedCreatePerms = {};

  function admRankPermChips(catalog, permissions) {
    return catalog.map((p) => {
      const on = !!(permissions && permissions[p.key]);
      return `<span class="adm-rank-perm-chip${on ? "" : " off"}">${escapeHtml(p.label)}</span>`;
    }).join("");
  }

  function guildRanksTabHtml() {
    const catalog = activeGuildDetail.permissionCatalog || [];
    const ranks = activeGuildDetail.ranks || [];
    const maxPoints = activeGuildDetail.rankPointsMax ?? 998;
    const leaderPoints = activeGuildDetail.leaderRankPoints ?? 999;
    const officerPoints = activeGuildDetail.officerRankPoints ?? 500;
    _admSelectedCreatePerms = {};
    const createPermChecks = catalog.map((p) => `
      <label><input type="checkbox" data-perm="${p.key}" /> <span>${escapeHtml(p.label)}</span></label>
    `).join("");
    const rankCards = ranks.map((r) => `
      <div class="adm-rank-card" data-rank="${r.id}">
        <div class="adm-rank-card-name">
          <span>${escapeHtml(r.name)} <span class="adm-hint" style="margin:0">(แต้มยศ ${r.rankPoints})</span></span>
          <span class="adm-hint" style="margin:0">${r.memberCount} คน</span>
        </div>
        <div class="adm-rank-perm-list">${admRankPermChips(catalog, r.permissions)}</div>
        <div style="display:flex;gap:6px;margin-top:8px">
          <button data-ract="rename" data-id="${r.id}" data-name="${escapeHtml(r.name)}" data-points="${r.rankPoints}">แก้ไข</button>
          <button class="danger" data-ract="delete" data-id="${r.id}">ลบยศ</button>
        </div>
      </div>
    `).join("");
    return `
      <div class="adm-section-title">สร้างยศใหม่</div>
      <div class="adm-field">
        <label>ชื่อยศ</label>
        <input type="text" id="gNewRankName" maxlength="16" placeholder="เช่น ฝ่ายรับสมัคร" />
      </div>
      <div class="adm-field">
        <label>แต้มยศ (0-${maxPoints})</label>
        <input type="number" id="gNewRankPoints" min="0" max="${maxPoints}" value="0" />
        <p class="adm-hint">คนที่ถือยศจะมอบยศต่อได้เฉพาะยศที่แต้มไม่เกินของตัวเอง (หัวหน้า = ${leaderPoints}, รองหัวหน้า = ${officerPoints}) — แอดมินตั้งค่าได้อิสระไม่ติดข้อจำกัดนี้</p>
      </div>
      <div class="adm-field">
        <label>สิทธิ์ในกิลด์ที่ยศนี้ทำได้</label>
        <div class="adm-perm-check-list" id="gNewRankPerms">${createPermChecks}</div>
      </div>
      ${guildFormMsgHtml("gRanksMsg")}
      <button id="gCreateRankBtn" style="width:100%">สร้างยศ</button>
      <hr class="adm-divider" />
      <div class="adm-section-title">ยศทั้งหมดในกิลด์นี้ (${ranks.length}/10)</div>
      ${rankCards || '<p class="adm-mini-empty">ยังไม่มียศที่สร้างเอง — ไปมอบยศให้สมาชิกได้ที่แท็บ "สมาชิก" หลังสร้าง</p>'}
    `;
  }

  function bindGuildRanksTab() {
    document.getElementById("gNewRankPerms").querySelectorAll("input[type=checkbox]").forEach((cb) => {
      cb.addEventListener("change", () => { _admSelectedCreatePerms[cb.dataset.perm] = cb.checked; });
    });

    document.getElementById("gCreateRankBtn").addEventListener("click", async () => {
      const name = document.getElementById("gNewRankName").value.trim();
      if (!name) return showGuildFormMsg("gRanksMsg", false, "กรุณาตั้งชื่อยศ");
      const rankPoints = Number(document.getElementById("gNewRankPoints").value) || 0;
      try {
        await adminFetch(`/guilds/${activeGuildId}/ranks`, { method: "POST", body: JSON.stringify({ name, permissions: _admSelectedCreatePerms, rankPoints }) });
        activeGuildDetail = await adminFetch(`/guilds/${activeGuildId}`);
        renderGuildTabBody();
      } catch (err) {
        showGuildFormMsg("gRanksMsg", false, err.message);
      }
    });

    document.getElementById("guildModalBody").querySelectorAll("button[data-ract]").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const id = btn.dataset.id;
        try {
          if (btn.dataset.ract === "delete") {
            if (!(await uiConfirm("ลบยศนี้? สมาชิกที่ถือยศนี้จะกลายเป็นสมาชิกทั่วไปทันที"))) return;
            await adminFetch(`/guilds/${activeGuildId}/ranks/${id}`, { method: "DELETE" });
          } else if (btn.dataset.ract === "rename") {
            const newName = prompt("ชื่อยศใหม่:", btn.dataset.name);
            if (newName === null || !newName.trim()) return;
            const newPointsRaw = prompt("แต้มยศใหม่:", btn.dataset.points);
            if (newPointsRaw === null) return;
            const payload = { name: newName.trim() };
            if (newPointsRaw.trim() !== "") payload.rankPoints = Number(newPointsRaw);
            await adminFetch(`/guilds/${activeGuildId}/ranks/${id}`, { method: "PATCH", body: JSON.stringify(payload) });
          }
          activeGuildDetail = await adminFetch(`/guilds/${activeGuildId}`);
          renderGuildTabBody();
        } catch (err) {
          showGuildFormMsg("gRanksMsg", false, err.message);
        }
      });
    });
  }

  // ---- ปิดกิลด์ (ยุบถาวร) ----
  function guildDangerTabHtml() {
    const g = activeGuildDetail.guild;
    return `
      <p style="color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:16px">
        กิลด์ "<strong>[${escapeHtml(g.tag)}] ${escapeHtml(g.name)}</strong>" จะถูกปิดและลบอย่างถาวร
        รวมถึงคลังกิลด์ สมาชิกทั้งหมด ยศที่สร้างไว้ ประวัติแชท และข้อมูลบอสกิลด์ การกระทำนี้ไม่สามารถย้อนกลับได้
      </p>
      ${guildFormMsgHtml("gDangerMsg")}
      <button id="gDisbandBtn" class="danger" style="width:100%">ปิดกิลด์ถาวร (ยุบกิลด์)</button>
    `;
  }

  function bindGuildDangerTab() {
    document.getElementById("gDisbandBtn").addEventListener("click", async () => {
      const g = activeGuildDetail.guild;
      if (!(await uiConfirm(`ยืนยันปิดกิลด์ "[${g.tag}] ${g.name}" ถาวร? สมาชิกทุกคนจะออกจากกิลด์ทันที`))) return;
      try {
        await adminFetch(`/guilds/${activeGuildId}/disband`, { method: "POST" });
        closeGuildModal();
        loadGuilds();
      } catch (err) {
        showGuildFormMsg("gDangerMsg", false, err.message);
      }
    });
  }

  // boot
  if (getToken()) { showConsole(); } else { showGate(); }
</script>
</body>
</html>
