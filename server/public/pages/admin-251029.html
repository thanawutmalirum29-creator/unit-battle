<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<title>Admin Console — UnitBattle</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="robots" content="noindex, nofollow" />
<link rel="stylesheet" href="../css/game.css" />
<link rel="stylesheet" href="../css/theme.css" />
<script src="../js/core/ui-popup.js"></script>
<style>
  /* admin-only additions — everything else borrows theme.css so this still
     looks like part of the same product instead of a bolted-on tool. */
  body{ max-width:900px; }
  #gateScreen{ max-width:340px; margin:80px auto 0; text-align:center; }
  #gateScreen input{ text-align:center; letter-spacing:4px; font-size:18px; }

  .adm-table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  .adm-table th{ text-align:left; color:var(--muted); font-weight:600; font-size:12px; padding:8px 6px; border-bottom:1px solid var(--border); }
  .adm-table td{ padding:10px 6px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .adm-table tr:last-child td{ border-bottom:none; }
  .adm-table tbody tr{ cursor:pointer; transition:background .12s; }
  .adm-table tbody tr:hover{ background:var(--panel-soft); }
  .adm-id{ font-family:monospace; font-size:11.5px; color:var(--muted); word-break:break-all; }
  .adm-chevron{ color:var(--muted); text-align:right; }
  .adm-badge{ font-size:11px; padding:2px 8px; border-radius:999px; white-space:nowrap; }
  .adm-badge.active{ background:rgba(16,185,129,.15); color:var(--good); }
  .adm-badge.suspended{ background:rgba(255,213,79,.15); color:var(--gold); }
  .adm-badge.banned{ background:rgba(239,68,68,.15); color:var(--bad); }
  .adm-toolbar{ display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
  .adm-toolbar input[type="text"]{ flex:1 1 220px; }

  #adminOverlay{
    display:none; position:fixed; inset:0; background:rgba(4,6,10,.72);
    align-items:flex-start; justify-content:center; padding:16px; z-index:90;
    overflow-y:auto;
  }
  #adminOverlay.open{ display:flex; }
  .adm-modal{ width:100%; max-width:460px; margin:24px auto; }
  .adm-modal-header{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; gap:8px; }
  .adm-modal-header button{ background:none; border:none; color:var(--muted); font-size:18px; padding:0; line-height:1; }
  .adm-modal-sub{ color:var(--muted); font-size:12px; margin-bottom:14px; }

  .adm-tabs{ display:flex; gap:4px; margin-bottom:14px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .adm-tab{ background:none; border:none; padding:8px 10px; font-size:12.5px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; }
  .adm-tab.active{ color:var(--text); border-bottom-color:var(--accent); font-weight:700; }
  .adm-tab.danger.active{ color:#ffd5d5; border-bottom-color:var(--bad); }

  .adm-field{ margin-bottom:12px; }
  .adm-field label{ display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  .adm-field input, .adm-field select, .adm-field textarea{ width:100%; }
  .adm-row2{ display:flex; gap:8px; }
  .adm-row2 > div{ flex:1; }
  .adm-hint{ font-size:11.5px; color:var(--muted); margin:-6px 0 12px; }
  .adm-section-title{ font-weight:700; font-size:13px; margin:0 0 8px; }
  .adm-divider{ border:none; border-top:1px solid var(--border); margin:16px 0; }

  .adm-overview-row{ display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .adm-overview-row:last-child{ border-bottom:none; }
  .adm-overview-row .label{ color:var(--muted); }

  .adm-mini-list{ max-height:160px; overflow-y:auto; border:1px solid var(--border); border-radius:var(--radius-sm); padding:6px 8px; margin-top:4px; }
  .adm-mini-item{ display:flex; justify-content:space-between; gap:8px; font-size:12.5px; padding:4px 0; border-bottom:1px solid var(--border); }
  .adm-mini-item:last-child{ border-bottom:none; }
  .adm-mini-empty{ color:var(--muted); font-size:12.5px; text-align:center; padding:10px 0; }

  #adminStatusMsg{ font-size:12px; color:var(--muted); margin-bottom:10px; }
  .adm-formmsg{ font-size:12px; margin-bottom:8px; display:none; }
  .adm-formmsg.error{ color:var(--bad); }
  .adm-formmsg.ok{ color:var(--good); }
</style>
</head>
<body>

<div id="gateScreen">
  <h2>🛡️ Admin Console</h2>
  <p class="muted">กรอกรหัสผ่านเพื่อเข้าใช้งาน</p>
  <form id="gateForm">
    <input type="password" id="gateCode" placeholder="รหัสผ่าน" autocomplete="off" autofocus />
    <div id="gateError" style="color:var(--bad);font-size:12px;margin-top:6px;display:none"></div>
    <button type="submit" style="width:100%;margin-top:10px">เข้าสู่ระบบ</button>
  </form>
</div>

<div id="consoleScreen" style="display:none">
  <header class="topbar">
    <h1>🛡️ Admin Console</h1>
    <div class="right-group">
      <button id="adminLogoutBtn">ออกจากระบบ</button>
    </div>
  </header>

  <section class="panel">
    <div class="adm-toolbar">
      <input type="text" id="adminSearch" placeholder="ค้นหาด้วยชื่อหรือ ID" />
      <button id="adminRefreshBtn">🔄 รีเฟรช</button>
    </div>
    <div id="adminStatusMsg"></div>
    <div style="overflow-x:auto">
      <table class="adm-table">
        <thead>
          <tr>
            <th>ผู้เล่น</th><th>Public ID</th><th>Internal ID</th><th>สถานะ</th><th></th>
          </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>
  </section>
</div>

<!-- Player detail / management popup -->
<div id="adminOverlay">
  <div class="panel adm-modal" onclick="event.stopPropagation()">
    <div class="adm-modal-header">
      <div>
        <strong id="adminModalTitle">ผู้เล่น</strong>
        <div class="adm-modal-sub" id="adminModalSub"></div>
      </div>
      <button id="adminModalCloseBtn">✕</button>
    </div>
    <div class="adm-tabs" id="adminTabs">
      <button class="adm-tab" data-tab="overview">ภาพรวม</button>
      <button class="adm-tab" data-tab="edit">แก้ไข</button>
      <button class="adm-tab" data-tab="gift">ส่งเมล / ไอเทม</button>
      <button class="adm-tab danger" data-tab="danger">ลบบัญชี</button>
    </div>
    <div id="adminModalBody"></div>
  </div>
</div>

<script>
  const ADMIN_TOKEN_KEY = "adminToken";
  let players = [];
  let bagKeys = [];
  let catalog = { characters: [], equips: [] };
  let activePlayerId = null;
  let activeTab = "overview";
  let activePlayerDetail = null; // cached full detail (deck/equip/bag) for the open modal

  function getToken() { return sessionStorage.getItem(ADMIN_TOKEN_KEY); }
  function setToken(t) { sessionStorage.setItem(ADMIN_TOKEN_KEY, t); }
  function clearToken() { sessionStorage.removeItem(ADMIN_TOKEN_KEY); }

  async function adminFetch(path, options = {}) {
    const headers = Object.assign({ "Content-Type": "application/json" }, options.headers || {});
    const token = getToken();
    if (token) headers["Authorization"] = "Bearer " + token;
    const res = await fetch("/api/admin" + path, { ...options, headers });
    const data = await res.json().catch(() => null);
    if (res.status === 401) {
      clearToken();
      showGate("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่");
      throw new Error("unauthorized");
    }
    if (!res.ok) throw new Error(data?.error || `http ${res.status}`);
    return data;
  }

  function showGate(errorMsg) {
    document.getElementById("gateScreen").style.display = "block";
    document.getElementById("consoleScreen").style.display = "none";
    const errEl = document.getElementById("gateError");
    if (errorMsg) { errEl.textContent = errorMsg; errEl.style.display = "block"; }
    else { errEl.style.display = "none"; }
  }

  function showConsole() {
    document.getElementById("gateScreen").style.display = "none";
    document.getElementById("consoleScreen").style.display = "block";
    loadBagKeys();
    loadCatalog();
    loadPlayers();
  }

  document.getElementById("gateForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const code = document.getElementById("gateCode").value;
    try {
      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code }),
      });
      const data = await res.json().catch(() => null);
      if (!res.ok) throw new Error(data?.error || "เข้าสู่ระบบไม่สำเร็จ");
      setToken(data.token);
      showConsole();
    } catch (err) {
      document.getElementById("gateError").textContent = err.message;
      document.getElementById("gateError").style.display = "block";
    }
  });

  document.getElementById("adminLogoutBtn").addEventListener("click", async () => {
    try { await adminFetch("/logout", { method: "POST" }); } catch {}
    clearToken();
    showGate();
  });

  async function loadBagKeys() {
    try { bagKeys = await adminFetch("/bag-keys"); } catch { bagKeys = []; }
  }

  async function loadCatalog() {
    try { catalog = await adminFetch("/catalog"); } catch { catalog = { characters: [], equips: [] }; }
  }

  function statusLabel(s) {
    return s === "active" ? "ปกติ" : s === "suspended" ? "ระงับ" : "แบน";
  }

  async function loadPlayers() {
    const statusMsg = document.getElementById("adminStatusMsg");
    statusMsg.textContent = "กำลังโหลด…";
    try {
      const q = document.getElementById("adminSearch").value.trim();
      players = await adminFetch("/players" + (q ? `?q=${encodeURIComponent(q)}` : ""));
      renderTable();
      statusMsg.textContent = `บัญชีทั้งหมด ${players.length} รายการ`;
    } catch (err) {
      statusMsg.textContent = "โหลดไม่สำเร็จ: " + err.message;
    }
  }

  function renderTable() {
    const body = document.getElementById("adminTableBody");
    if (players.length === 0) {
      body.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px">ไม่พบบัญชี</td></tr>`;
      return;
    }
    body.innerHTML = players.map((p) => `
      <tr data-id="${p.id}">
        <td><strong>${escapeHtml(p.username)}</strong></td>
        <td class="adm-id">${p.publicId || "-"}</td>
        <td class="adm-id">${p.id}</td>
        <td><span class="adm-badge ${p.status}">${statusLabel(p.status)}</span></td>
        <td class="adm-chevron">›</td>
      </tr>
    `).join("");

    body.querySelectorAll("tr[data-id]").forEach((row) => {
      row.addEventListener("click", () => openPlayerModal(row.dataset.id));
    });
  }

  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s == null ? "" : s;
    return d.innerHTML;
  }

  document.getElementById("adminSearch").addEventListener("input", debounce(loadPlayers, 350));
  document.getElementById("adminRefreshBtn").addEventListener("click", loadPlayers);

  function debounce(fn, ms) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
  }

  // ------------------------------------------------------------------
  // Player popup — one modal, tabbed: overview / edit / gift / danger
  // ------------------------------------------------------------------
  async function openPlayerModal(id) {
    activePlayerId = id;
    activeTab = "overview";
    const p = players.find((x) => x.id === id);
    if (!p) return;

    document.getElementById("adminModalTitle").textContent = p.username;
    document.getElementById("adminModalSub").innerHTML =
      `Public ID: <span class="adm-id">${p.publicId || "-"}</span> · Internal ID: <span class="adm-id">${p.id}</span>`;
    document.getElementById("adminOverlay").classList.add("open");
    document.getElementById("adminModalBody").innerHTML = `<p class="muted" style="text-align:center;padding:20px 0">กำลังโหลด…</p>`;

    setActiveTab("overview");

    try {
      activePlayerDetail = await adminFetch(`/players/${id}`);
    } catch (err) {
      document.getElementById("adminModalBody").innerHTML = `<p style="color:var(--bad)">โหลดข้อมูลไม่สำเร็จ: ${escapeHtml(err.message)}</p>`;
      return;
    }
    renderTabBody();
  }

  function closeModal() {
    document.getElementById("adminOverlay").classList.remove("open");
    activePlayerId = null;
    activePlayerDetail = null;
  }
  document.getElementById("adminModalCloseBtn").addEventListener("click", closeModal);
  document.getElementById("adminOverlay").addEventListener("click", closeModal);

  document.getElementById("adminTabs").addEventListener("click", (e) => {
    const btn = e.target.closest(".adm-tab");
    if (!btn) return;
    setActiveTab(btn.dataset.tab);
    renderTabBody();
  });

  function setActiveTab(tab) {
    activeTab = tab;
    document.querySelectorAll(".adm-tab").forEach((b) => b.classList.toggle("active", b.dataset.tab === tab));
  }

  function renderTabBody() {
    const p = players.find((x) => x.id === activePlayerId);
    if (!p || !activePlayerDetail) return;
    const body = document.getElementById("adminModalBody");
    if (activeTab === "overview") body.innerHTML = overviewTabHtml(p, activePlayerDetail);
    if (activeTab === "edit") body.innerHTML = editTabHtml(p);
    if (activeTab === "gift") body.innerHTML = giftTabHtml(p);
    if (activeTab === "danger") body.innerHTML = dangerTabHtml(p);
    bindTabHandlers();
  }

  function bindTabHandlers() {
    if (activeTab === "edit") bindEditTab();
    if (activeTab === "gift") bindGiftTab();
    if (activeTab === "danger") bindDangerTab();
  }

  // ---- Overview ----
  function overviewTabHtml(p, d) {
    const created = d.createdAt ? new Date(d.createdAt).toLocaleString("th-TH") : "-";
    const deckRows = d.deck.length
      ? d.deck.map((c) => `<div class="adm-mini-item"><span>${escapeHtml(c.name)} <span class="muted">(${escapeHtml(c.rarity)})</span></span><span class="muted">Lv.${c.level || 1}</span></div>`).join("")
      : `<div class="adm-mini-empty">ไม่มีการ์ดในเด็ค</div>`;
    const equipRows = d.equipBag.length
      ? d.equipBag.map((it) => `<div class="adm-mini-item"><span>${escapeHtml(it.name)} <span class="muted">(${escapeHtml(it.rarity)})</span></span><span class="muted">${escapeHtml(it.type)}</span></div>`).join("")
      : `<div class="adm-mini-empty">ไม่มีอุปกรณ์ในกระเป๋า</div>`;

    return `
      <div class="adm-overview-row"><span class="label">สถานะ</span><span class="adm-badge ${p.status}">${statusLabel(p.status)}</span></div>
      <div class="adm-overview-row"><span class="label">สมัครเมื่อ</span><span>${created}</span></div>
      <div class="adm-overview-row"><span class="label">💰 เงิน</span><span>${d.money}</span></div>
      <div class="adm-overview-row"><span class="label">🎴 การ์ดในเด็ค</span><span>${d.deck.length}</span></div>
      <div class="adm-overview-row"><span class="label">🛡️ อุปกรณ์ในกระเป๋า</span><span>${d.equipBag.length}</span></div>
      <hr class="adm-divider" />
      <div class="adm-section-title">🎴 เด็คปัจจุบัน</div>
      <div class="adm-mini-list">${deckRows}</div>
      <div class="adm-section-title" style="margin-top:12px">🛡️ กระเป๋าอุปกรณ์</div>
      <div class="adm-mini-list">${equipRows}</div>
    `;
  }

  // ---- Edit (rename / status) ----
  function editTabHtml(p) {
    return `
      <div class="adm-field">
        <label>ชื่อบัญชี</label>
        <input type="text" id="editUsername" value="${escapeHtml(p.username)}" />
      </div>
      <div class="adm-field">
        <label>สถานะ</label>
        <select id="editStatus">
          <option value="active" ${p.status === "active" ? "selected" : ""}>ปกติ</option>
          <option value="suspended" ${p.status === "suspended" ? "selected" : ""}>ระงับการใช้งาน</option>
          <option value="banned" ${p.status === "banned" ? "selected" : ""}>แบน</option>
        </select>
      </div>
      <div id="editMsg" class="adm-formmsg"></div>
      <button id="editSaveBtn" style="width:100%">บันทึกการเปลี่ยนแปลง</button>
    `;
  }

  function bindEditTab() {
    document.getElementById("editSaveBtn").addEventListener("click", async () => {
      const username = document.getElementById("editUsername").value.trim();
      const status = document.getElementById("editStatus").value;
      const msgEl = document.getElementById("editMsg");
      try {
        await adminFetch(`/players/${activePlayerId}`, {
          method: "PATCH",
          body: JSON.stringify({ username, status }),
        });
        msgEl.className = "adm-formmsg ok";
        msgEl.textContent = "บันทึกแล้ว";
        msgEl.style.display = "block";
        await loadPlayers();
        const p = players.find((x) => x.id === activePlayerId);
        if (p) {
          document.getElementById("adminModalTitle").textContent = p.username;
        }
      } catch (err) {
        msgEl.className = "adm-formmsg error";
        msgEl.textContent = err.message;
        msgEl.style.display = "block";
      }
    });
  }

  // ---- Gift: mail + money + bag item + character + equipment, all in one send ----
  function giftTabHtml(p) {
    const bagOptions = bagKeys.map((k) => `<option value="${k}">${k}</option>`).join("");
    const charOptions = catalog.characters
      .slice().sort((a, b) => a.name.localeCompare(b.name))
      .map((c) => `<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)} — ${escapeHtml(c.rarity)}</option>`).join("");
    const equipOptions = catalog.equips
      .slice().sort((a, b) => a.name.localeCompare(b.name))
      .map((e) => `<option value="${escapeHtml(e.name)}">${escapeHtml(e.name)} — ${escapeHtml(e.rarity)} (${escapeHtml(e.type)})</option>`).join("");

    return `
      <div class="adm-field">
        <label>หัวข้อ</label>
        <input type="text" id="mailSubject" placeholder="เช่น รางวัลกิจกรรม" />
      </div>
      <div class="adm-field">
        <label>ข้อความ</label>
        <textarea id="mailBody" rows="3"></textarea>
      </div>

      <div class="adm-section-title">แนบของรางวัล (เลือกได้หลายอย่าง ไม่บังคับ)</div>

      <div class="adm-row2">
        <div class="adm-field">
          <label>💰 เงิน</label>
          <input type="number" id="mailMoney" value="0" min="0" />
        </div>
      </div>
      <div class="adm-row2">
        <div class="adm-field">
          <label>ไอเทมทรัพยากร</label>
          <select id="mailBagKey">
            <option value="">— ไม่แนบ —</option>
            ${bagOptions}
          </select>
        </div>
        <div class="adm-field">
          <label>จำนวน</label>
          <input type="number" id="mailBagQty" value="0" min="0" />
        </div>
      </div>
      <div class="adm-field">
        <label>🧑‍🤝‍🧑 ส่งตัวละคร</label>
        <select id="mailCard">
          <option value="">— ไม่แนบ —</option>
          ${charOptions}
        </select>
      </div>
      <div class="adm-hint">ตัวละครจะเข้าเด็คของผู้เล่นเป็น Lv.1 ทันทีที่กดรับเมล</div>
      <div class="adm-field">
        <label>🗡️ ส่งอุปกรณ์</label>
        <select id="mailEquip">
          <option value="">— ไม่แนบ —</option>
          ${equipOptions}
        </select>
      </div>
      <div class="adm-hint">อุปกรณ์จะเข้ากระเป๋าอุปกรณ์ของผู้เล่นทันทีที่กดรับเมล</div>

      <div id="mailMsg" class="adm-formmsg"></div>
      <button id="mailSendBtn" style="width:100%">ส่งเมล</button>
    `;
  }

  function bindGiftTab() {
    document.getElementById("mailSendBtn").addEventListener("click", async () => {
      const subject = document.getElementById("mailSubject").value.trim();
      const body = document.getElementById("mailBody").value.trim();
      const money = Number(document.getElementById("mailMoney").value) || 0;
      const bagKey = document.getElementById("mailBagKey").value || null;
      const bagQty = Number(document.getElementById("mailBagQty").value) || 0;
      const cardName = document.getElementById("mailCard").value || null;
      const equipName = document.getElementById("mailEquip").value || null;
      const msgEl = document.getElementById("mailMsg");

      if (!subject) {
        msgEl.className = "adm-formmsg error";
        msgEl.textContent = "กรุณากรอกหัวข้อ";
        msgEl.style.display = "block";
        return;
      }

      const sendBtn = document.getElementById("mailSendBtn");
      sendBtn.disabled = true;
      sendBtn.textContent = "กำลังส่ง…";
      try {
        await adminFetch(`/players/${activePlayerId}/mail`, {
          method: "POST",
          body: JSON.stringify({ subject, body, money, bagKey, bagQty, cardName, equipName }),
        });
        msgEl.className = "adm-formmsg ok";
        msgEl.textContent = "ส่งเมลแล้ว ✅";
        msgEl.style.display = "block";
        document.getElementById("mailSubject").value = "";
        document.getElementById("mailBody").value = "";
        document.getElementById("mailMoney").value = "0";
        document.getElementById("mailBagKey").value = "";
        document.getElementById("mailBagQty").value = "0";
        document.getElementById("mailCard").value = "";
        document.getElementById("mailEquip").value = "";
      } catch (err) {
        msgEl.className = "adm-formmsg error";
        msgEl.textContent = err.message;
        msgEl.style.display = "block";
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "ส่งเมล";
      }
    });
  }

  // ---- Danger: delete ----
  function dangerTabHtml(p) {
    return `
      <p style="color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:16px">
        บัญชี "<strong>${escapeHtml(p.username)}</strong>" (${p.publicId}) จะถูกลบอย่างถาวร
        รวมถึงกล่องจดหมาย ประวัติการเล่น และทรัพยากรทั้งหมด การกระทำนี้ไม่สามารถย้อนกลับได้
      </p>
      <button id="deleteConfirmBtn" class="danger" style="width:100%">ลบบัญชีนี้ถาวร</button>
    `;
  }

  function bindDangerTab() {
    document.getElementById("deleteConfirmBtn").addEventListener("click", async () => {
      const p = players.find((x) => x.id === activePlayerId);
      if (!p) return;
      if (!(await uiConfirm(`ยืนยันลบบัญชี "${p.username}" ถาวร?`))) return;
      try {
        await adminFetch(`/players/${activePlayerId}`, { method: "DELETE" });
        closeModal();
        loadPlayers();
      } catch (err) {
        alert("ลบไม่สำเร็จ: " + err.message);
      }
    });
  }

  // boot
  if (getToken()) { showConsole(); } else { showGate(); }
</script>
</body>
</html>
