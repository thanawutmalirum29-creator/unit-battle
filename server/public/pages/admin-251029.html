<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<title>Admin Console — UnitBattle</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="robots" content="noindex, nofollow" />
<link rel="stylesheet" href="../css/game.css" />
<link rel="stylesheet" href="../css/theme.css" />
<script src="../js/core/ui-popup.js"></script>
<style>
  /* admin-only additions — everything else borrows theme.css so this still
     looks like part of the same product instead of a bolted-on tool. */
  body{ max-width:900px; }
  #gateScreen{ max-width:340px; margin:80px auto 0; text-align:center; }
  #gateScreen input{ text-align:center; letter-spacing:4px; font-size:18px; }

  .adm-table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  .adm-table th{ text-align:left; color:var(--muted); font-weight:600; font-size:12px; padding:8px 6px; border-bottom:1px solid var(--border); }
  .adm-table td{ padding:10px 6px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .adm-table tr:last-child td{ border-bottom:none; }
  .adm-table tbody tr{ cursor:pointer; transition:background .12s; }
  .adm-table tbody tr:hover{ background:var(--panel-soft); }
  .adm-id{ font-family:monospace; font-size:11.5px; color:var(--muted); word-break:break-all; }
  .adm-chevron{ color:var(--muted); text-align:right; }
  .adm-badge{ font-size:11px; padding:2px 8px; border-radius:999px; white-space:nowrap; }
  .adm-badge.active{ background:rgba(16,185,129,.15); color:var(--good); }
  .adm-badge.suspended{ background:rgba(255,213,79,.15); color:var(--gold); }
  .adm-badge.banned{ background:rgba(239,68,68,.15); color:var(--bad); }
  .adm-badge.guest{ background:rgba(147,161,181,.18); color:var(--muted); border:1px solid rgba(147,161,181,.35); margin-left:6px; }
  .adm-toolbar{ display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
  .adm-toolbar input[type="text"]{ flex:1 1 220px; }

  #adminOverlay{
    display:none; position:fixed; inset:0; background:rgba(4,6,10,.72);
    align-items:flex-start; justify-content:center; padding:16px; z-index:90;
    overflow-y:auto;
  }
  #adminOverlay.open{ display:flex; }
  .adm-modal{ width:100%; max-width:460px; margin:24px auto; }
  .adm-modal-header{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; gap:8px; }
  .adm-modal-header button{ background:none; border:none; color:var(--muted); font-size:18px; padding:0; line-height:1; }
  .adm-modal-sub{ color:var(--muted); font-size:12px; margin-bottom:14px; }

  .adm-tabs{ display:flex; gap:4px; margin-bottom:14px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .adm-tab{ background:none; border:none; padding:8px 10px; font-size:12.5px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; }
  .adm-tab.active{ color:var(--text); border-bottom-color:var(--accent); font-weight:700; }
  .adm-tab.danger.active{ color:#ffd5d5; border-bottom-color:var(--bad); }

  .adm-field{ margin-bottom:12px; }
  .adm-field label{ display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  .adm-field input, .adm-field select, .adm-field textarea{ width:100%; }
  .adm-row2{ display:flex; gap:8px; }
  .adm-row2 > div{ flex:1; }
  .adm-hint{ font-size:11.5px; color:var(--muted); margin:-6px 0 12px; }
  .adm-section-title{ font-weight:700; font-size:13px; margin:0 0 8px; }
  .adm-divider{ border:none; border-top:1px solid var(--border); margin:16px 0; }

  .adm-overview-row{ display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .adm-overview-row:last-child{ border-bottom:none; }
  .adm-overview-row .label{ color:var(--muted); }

  .adm-mini-list{ max-height:160px; overflow-y:auto; border:1px solid var(--border); border-radius:var(--radius-sm); padding:6px 8px; margin-top:4px; }
  .adm-mini-item{ display:flex; justify-content:space-between; gap:8px; font-size:12.5px; padding:4px 0; border-bottom:1px solid var(--border); }
  .adm-mini-item:last-child{ border-bottom:none; }
  .adm-mini-empty{ color:var(--muted); font-size:12.5px; text-align:center; padding:10px 0; }

  #adminStatusMsg{ font-size:12px; color:var(--muted); margin-bottom:10px; }
  .adm-formmsg{ font-size:12px; margin-bottom:8px; display:none; }
  .adm-formmsg.error{ color:var(--bad); }
  .adm-formmsg.ok{ color:var(--good); }

  /* ---- visual polish: header + stat cards ---- */
  #consoleScreen .topbar{
    background:linear-gradient(135deg, rgba(92,139,255,.12), rgba(123,214,255,.05));
    border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 18px; margin-bottom:16px;
  }
  .adm-stats-row{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
  @media (min-width:560px){ .adm-stats-row{ grid-template-columns:repeat(4,1fr); } }
  .adm-stat-card{
    background:var(--panel-soft); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:12px 14px; text-align:center;
  }
  .adm-stat-value{ font-size:20px; font-weight:800; color:var(--text); }
  .adm-stat-card.gold .adm-stat-value{ color:var(--gold); }
  .adm-stat-card.warn .adm-stat-value{ color:var(--bad); }
  .adm-stat-card.good .adm-stat-value{ color:var(--good); }
  .adm-stat-label{ font-size:11px; color:var(--muted); margin-top:2px; }

  /* ---- table polish ---- */
  .adm-table tbody tr{ border-radius:8px; }
  .adm-table tbody tr:hover{ background:rgba(92,139,255,.07); }
  .adm-money{ font-weight:700; }
  .adm-money.negative{ color:var(--bad); }

  /* ---- reclaim warning box ---- */
  .adm-warn-box{
    background:rgba(255,213,79,.08); border:1px solid rgba(255,213,79,.3);
    color:#ffe6a8; border-radius:var(--radius-sm); padding:10px 12px;
    font-size:12px; line-height:1.6; margin-bottom:14px;
  }

  /* ---- shared "timeline" list (history tab + reclaim log) ---- */
  .adm-timeline{ display:flex; flex-direction:column; gap:6px; max-height:320px; overflow-y:auto; }
  .adm-timeline-item{
    display:flex; gap:10px; align-items:flex-start;
    background:var(--panel-soft); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:9px 10px;
  }
  .adm-timeline-icon{ font-size:16px; line-height:1.4; flex-shrink:0; }
  .adm-timeline-body{ flex:1; min-width:0; }
  .adm-timeline-top{ display:flex; justify-content:space-between; gap:8px; align-items:baseline; flex-wrap:wrap; }
  .adm-timeline-label{ font-size:13px; font-weight:600; }
  .adm-timeline-time{ font-size:11px; color:var(--muted); white-space:nowrap; }
  .adm-timeline-bits{ font-size:12px; color:var(--muted); margin-top:3px; }
  .adm-timeline-bits.muted{ font-style:italic; }

  .adm-tag{ display:inline-block; font-size:10.5px; padding:2px 7px; border-radius:999px; margin-right:4px; }
  .adm-tag.bad{ background:rgba(239,68,68,.15); color:#ff9d9d; }
  .adm-tag.warn{ background:rgba(255,213,79,.15); color:var(--gold); }
</style>
</head>
<body>

<div id="gateScreen">
  <h2><span class=gicon-shield></span> Admin Console</h2>
  <p class="muted">กรอกรหัสผ่านเพื่อเข้าใช้งาน</p>
  <form id="gateForm">
    <input type="password" id="gateCode" placeholder="รหัสผ่าน" autocomplete="off" autofocus />
    <div id="gateError" style="color:var(--bad);font-size:12px;margin-top:6px;display:none"></div>
    <button type="submit" style="width:100%;margin-top:10px">เข้าสู่ระบบ</button>
  </form>
</div>

<div id="consoleScreen" style="display:none">
  <header class="topbar">
    <h1><span class=gicon-shield></span> Admin Console</h1>
    <div class="right-group">
      <button id="adminLogoutBtn">ออกจากระบบ</button>
    </div>
  </header>

  <div class="adm-stats-row" id="adminStatsRow"></div>

  <section class="panel">
    <div class="adm-toolbar">
      <input type="text" id="adminSearch" placeholder="ค้นหาด้วยชื่อหรือ ID" />
      <button id="adminRefreshBtn"><span class=gicon-refresh></span> รีเฟรช</button>
    </div>
    <div id="adminStatusMsg"></div>
    <div style="overflow-x:auto">
      <table class="adm-table">
        <thead>
          <tr>
            <th>ผู้เล่น</th><th>Public ID</th><th>Internal ID</th><th><span class=gicon-coin></span> เงิน</th><th>สถานะ</th><th></th>
          </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>
  </section>
</div>

<!-- Player detail / management popup -->
<div id="adminOverlay">
  <div class="panel adm-modal" onclick="event.stopPropagation()">
    <div class="adm-modal-header">
      <div>
        <strong id="adminModalTitle">ผู้เล่น</strong>
        <div class="adm-modal-sub" id="adminModalSub"></div>
      </div>
      <button id="adminModalCloseBtn"><span class=gicon-x></span></button>
    </div>
    <div class="adm-tabs" id="adminTabs">
      <button class="adm-tab" data-tab="overview"> ภาพรวม</button>
      <button class="adm-tab" data-tab="history"><span class=gicon-note></span> ประวัติการรับของ</button>
      <button class="adm-tab" data-tab="edit"><span class=gicon-pencil></span> แก้ไข</button>
      <button class="adm-tab" data-tab="gift"><span class=gicon-gift></span> ส่งเมล / ไอเทม</button>
      <button class="adm-tab" data-tab="reclaim"><span class=gicon-arrow-left></span> เรียกคืน</button>
      <button class="adm-tab danger" data-tab="danger"><span class=gicon-trash></span> ลบบัญชี</button>
    </div>
    <div id="adminModalBody"></div>
  </div>
</div>

<script>
  const ADMIN_TOKEN_KEY = "adminToken";
  let players = [];
  let bagKeys = [];
  let catalog = { characters: [], equips: [] };
  let activePlayerId = null;
  let activeTab = "overview";
  let activePlayerDetail = null; // cached full detail (deck/equip/bag) for the open modal

  function getToken() { return sessionStorage.getItem(ADMIN_TOKEN_KEY); }
  function setToken(t) { sessionStorage.setItem(ADMIN_TOKEN_KEY, t); }
  function clearToken() { sessionStorage.removeItem(ADMIN_TOKEN_KEY); }

  async function adminFetch(path, options = {}) {
    const headers = Object.assign({ "Content-Type": "application/json" }, options.headers || {});
    const token = getToken();
    if (token) headers["Authorization"] = "Bearer " + token;
    const res = await fetch("/api/admin" + path, { ...options, headers });
    const data = await res.json().catch(() => null);
    if (res.status === 401) {
      clearToken();
      showGate("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่");
      throw new Error("unauthorized");
    }
    if (!res.ok) throw new Error(data?.error || `http ${res.status}`);
    return data;
  }

  function showGate(errorMsg) {
    document.getElementById("gateScreen").style.display = "block";
    document.getElementById("consoleScreen").style.display = "none";
    const errEl = document.getElementById("gateError");
    if (errorMsg) { errEl.textContent = errorMsg; errEl.style.display = "block"; }
    else { errEl.style.display = "none"; }
  }

  function showConsole() {
    document.getElementById("gateScreen").style.display = "none";
    document.getElementById("consoleScreen").style.display = "block";
    loadBagKeys();
    loadCatalog();
    loadPlayers();
  }

  document.getElementById("gateForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const code = document.getElementById("gateCode").value;
    try {
      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code }),
      });
      const data = await res.json().catch(() => null);
      if (!res.ok) throw new Error(data?.error || "เข้าสู่ระบบไม่สำเร็จ");
      setToken(data.token);
      showConsole();
    } catch (err) {
      document.getElementById("gateError").textContent = err.message;
      document.getElementById("gateError").style.display = "block";
    }
  });

  document.getElementById("adminLogoutBtn").addEventListener("click", async () => {
    try { await adminFetch("/logout", { method: "POST" }); } catch {}
    clearToken();
    showGate();
  });

  async function loadBagKeys() {
    try { bagKeys = await adminFetch("/bag-keys"); } catch { bagKeys = []; }
  }

  async function loadCatalog() {
    try { catalog = await adminFetch("/catalog"); } catch { catalog = { characters: [], equips: [] }; }
  }

  function statusLabel(s) {
    return s === "active" ? "ปกติ" : s === "suspended" ? "ระงับ" : "แบน";
  }

  async function loadPlayers() {
    const statusMsg = document.getElementById("adminStatusMsg");
    statusMsg.textContent = "กำลังโหลด…";
    try {
      const q = document.getElementById("adminSearch").value.trim();
      players = await adminFetch("/players" + (q ? `?q=${encodeURIComponent(q)}` : ""));
      renderTable();
      renderStatsRow();
      statusMsg.textContent = `บัญชีทั้งหมด ${players.length} รายการ`;
    } catch (err) {
      statusMsg.textContent = "โหลดไม่สำเร็จ: " + err.message;
    }
  }

  function renderStatsRow() {
    const el = document.getElementById("adminStatsRow");
    const active = players.filter((p) => p.status === "active").length;
    const flagged = players.length - active;
    const totalMoney = players.reduce((sum, p) => sum + (Number(p.money) || 0), 0);
    el.innerHTML = `
      <div class="adm-stat-card">
        <div class="adm-stat-value">${players.length}</div>
        <div class="adm-stat-label">บัญชีทั้งหมด</div>
      </div>
      <div class="adm-stat-card good">
        <div class="adm-stat-value">${active}</div>
        <div class="adm-stat-label">ใช้งานได้ปกติ</div>
      </div>
      <div class="adm-stat-card warn">
        <div class="adm-stat-value">${flagged}</div>
        <div class="adm-stat-label">ถูกระงับ/แบน</div>
      </div>
      <div class="adm-stat-card gold">
        <div class="adm-stat-value">${totalMoney.toLocaleString()}</div>
        <div class="adm-stat-label"><span class=gicon-coin></span> เงินรวมในระบบ</div>
      </div>
    `;
  }

  function renderTable() {
    const body = document.getElementById("adminTableBody");
    if (players.length === 0) {
      body.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">ไม่พบบัญชี</td></tr>`;
      return;
    }
    body.innerHTML = players.map((p) => `
      <tr data-id="${p.id}">
        <td><strong>${escapeHtml(p.username)}</strong>${p.isGuest ? '<span class="adm-badge guest">ชั่วคราว</span>' : ''}</td>
        <td class="adm-id">${p.publicId || "-"}</td>
        <td class="adm-id">${p.id}</td>
        <td class="adm-money${p.money < 0 ? " negative" : ""}">${Number(p.money).toLocaleString()}</td>
        <td><span class="adm-badge ${p.status}">${statusLabel(p.status)}</span></td>
        <td class="adm-chevron">›</td>
      </tr>
    `).join("");

    body.querySelectorAll("tr[data-id]").forEach((row) => {
      row.addEventListener("click", () => openPlayerModal(row.dataset.id));
    });
  }

  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s == null ? "" : s;
    return d.innerHTML;
  }

  document.getElementById("adminSearch").addEventListener("input", debounce(loadPlayers, 350));
  document.getElementById("adminRefreshBtn").addEventListener("click", loadPlayers);

  function debounce(fn, ms) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
  }

  // ------------------------------------------------------------------
  // Player popup — one modal, tabbed: overview / edit / gift / danger
  // ------------------------------------------------------------------
  async function openPlayerModal(id) {
    activePlayerId = id;
    activeTab = "overview";
    const p = players.find((x) => x.id === id);
    if (!p) return;

    document.getElementById("adminModalTitle").textContent = p.username;
    document.getElementById("adminModalSub").innerHTML =
      `Public ID: <span class="adm-id">${p.publicId || "-"}</span> · Internal ID: <span class="adm-id">${p.id}</span>`;
    document.getElementById("adminOverlay").classList.add("open");
    document.getElementById("adminModalBody").innerHTML = `<p class="muted" style="text-align:center;padding:20px 0">กำลังโหลด…</p>`;

    setActiveTab("overview");

    try {
      activePlayerDetail = await adminFetch(`/players/${id}`);
    } catch (err) {
      document.getElementById("adminModalBody").innerHTML = `<p style="color:var(--bad)">โหลดข้อมูลไม่สำเร็จ: ${escapeHtml(err.message)}</p>`;
      return;
    }
    renderTabBody();
  }

  function closeModal() {
    document.getElementById("adminOverlay").classList.remove("open");
    activePlayerId = null;
    activePlayerDetail = null;
  }
  document.getElementById("adminModalCloseBtn").addEventListener("click", closeModal);
  document.getElementById("adminOverlay").addEventListener("click", closeModal);

  document.getElementById("adminTabs").addEventListener("click", (e) => {
    const btn = e.target.closest(".adm-tab");
    if (!btn) return;
    setActiveTab(btn.dataset.tab);
    renderTabBody();
  });

  function setActiveTab(tab) {
    activeTab = tab;
    document.querySelectorAll(".adm-tab").forEach((b) => b.classList.toggle("active", b.dataset.tab === tab));
  }

  function renderTabBody() {
    const p = players.find((x) => x.id === activePlayerId);
    if (!p || !activePlayerDetail) return;
    const body = document.getElementById("adminModalBody");
    if (activeTab === "overview") body.innerHTML = overviewTabHtml(p, activePlayerDetail);
    if (activeTab === "edit") body.innerHTML = editTabHtml(p);
    if (activeTab === "gift") body.innerHTML = giftTabHtml(p);
    if (activeTab === "history") { body.innerHTML = historyTabHtml(); loadHistoryInto(activePlayerId); }
    if (activeTab === "reclaim") body.innerHTML = reclaimTabHtml(p);
    if (activeTab === "danger") body.innerHTML = dangerTabHtml(p);
    bindTabHandlers();
  }

  function bindTabHandlers() {
    if (activeTab === "edit") bindEditTab();
    if (activeTab === "gift") bindGiftTab();
    if (activeTab === "reclaim") bindReclaimTab();
    if (activeTab === "danger") bindDangerTab();
  }

  // ---- Overview ----
  function overviewTabHtml(p, d) {
    const created = d.createdAt ? new Date(d.createdAt).toLocaleString("th-TH") : "-";
    const deckRows = d.deck.length
      ? d.deck.map((c) => `<div class="adm-mini-item"><span>${escapeHtml(c.name)} <span class="muted">(${escapeHtml(c.rarity)})</span></span><span class="muted">Lv.${c.level || 1}</span></div>`).join("")
      : `<div class="adm-mini-empty">ไม่มีการ์ดในเด็ค</div>`;
    const equipRows = d.equipBag.length
      ? d.equipBag.map((it) => `<div class="adm-mini-item"><span>${escapeHtml(it.name)} <span class="muted">(${escapeHtml(it.rarity)})</span></span><span class="muted">${escapeHtml(it.type)}</span></div>`).join("")
      : `<div class="adm-mini-empty">ไม่มีอุปกรณ์ในกระเป๋า</div>`;
    const bagEntries = Object.entries(d.bag || {}).filter(([, qty]) => Number(qty) !== 0);
    const bagRows = bagEntries.length
      ? bagEntries.map(([key, qty]) => {
          const neg = Number(qty) < 0;
          return `<div class="adm-mini-item"><span>${escapeHtml(key)}</span><span class="${neg ? "adm-money negative" : ""}">${Number(qty).toLocaleString()}${neg ? " (หนี้)" : ""}</span></div>`;
        }).join("")
      : `<div class="adm-mini-empty">ไม่มีทรัพยากรสะสม</div>`;
    const moneyNeg = Number(d.money) < 0;

    const statusDetailRows = [];
    if (p.status === 'suspended' || p.status === 'banned') {
      const reasonText = p.statusReason ? escapeHtml(p.statusReason) : '<span class="muted">ไม่ระบุเหตุผล</span>';
      statusDetailRows.push(`<div class="adm-overview-row"><span class="label">เหตุผล</span><span>${reasonText}</span></div>`);
      if (p.statusChangedAt) {
        statusDetailRows.push(`<div class="adm-overview-row"><span class="label">${p.status === 'banned' ? 'แบนเมื่อ' : 'ระงับตั้งแต่'}</span><span>${new Date(p.statusChangedAt).toLocaleString("th-TH")}</span></div>`);
      }
      if (p.status === 'suspended' && p.suspendedUntil) {
        const until = new Date(p.suspendedUntil);
        const daysLeft = Math.max(0, Math.ceil((until.getTime() - Date.now()) / (24 * 60 * 60 * 1000)));
        statusDetailRows.push(`<div class="adm-overview-row"><span class="label">ถึงวันที่</span><span>${until.toLocaleString("th-TH")} (เหลืออีก ${daysLeft} วัน)</span></div>`);
      }
      if (p.status === 'banned') {
        statusDetailRows.push(`<div class="adm-overview-row"><span class="label">ระยะเวลา</span><span>ถาวร จนกว่าแอดมินจะปลดแบน</span></div>`);
      }
    }

    return `
      <div class="adm-overview-row"><span class="label">สถานะ</span><span class="adm-badge ${p.status}">${statusLabel(p.status)}</span></div>
      <div class="adm-overview-row"><span class="label">ประเภทบัญชี</span><span>${p.isGuest ? '<span class="adm-badge guest">ชั่วคราว (ไม่มี PIN)</span>' : 'ปกติ'}</span></div>
      ${statusDetailRows.join("")}
      <div class="adm-overview-row"><span class="label">สมัครเมื่อ</span><span>${created}</span></div>
      <div class="adm-overview-row"><span class="label"><span class=gicon-coin></span> เงิน</span><span class="${moneyNeg ? "adm-money negative" : ""}">${Number(d.money).toLocaleString()}${moneyNeg ? " (ติดลบ/เป็นหนี้)" : ""}</span></div>
      <div class="adm-overview-row"><span class="label"><span class=gicon-card></span> การ์ดในเด็ค</span><span>${d.deck.length}</span></div>

  function bindEditTab() {
    const statusSelect = document.getElementById("editStatus");
    const daysField = document.getElementById("editDaysField");
    const reasonField = document.getElementById("editReasonField");

    function syncFieldVisibility() {
      const v = statusSelect.value;
      daysField.style.display = v === "suspended" ? "block" : "none";
      reasonField.style.display = (v === "suspended" || v === "banned") ? "block" : "none";
    }
    statusSelect.addEventListener("change", syncFieldVisibility);
    syncFieldVisibility();

    document.getElementById("editSaveBtn").addEventListener("click", async () => {
      const username = document.getElementById("editUsername").value.trim();
      const status = statusSelect.value;
      const reason = document.getElementById("editReason").value.trim();
      const daysRaw = document.getElementById("editDays").value;
      const msgEl = document.getElementById("editMsg");

      if (status === "suspended" && (!daysRaw || Number(daysRaw) <= 0)) {
        msgEl.className = "adm-formmsg error";
        msgEl.textContent = "กรุณาระบุจำนวนวันที่จะระงับ";
        msgEl.style.display = "block";
        return;
      }

      const body = { username, status };
      if (status === "suspended") {
        body.days = Number(daysRaw);
        body.reason = reason || undefined;
      } else if (status === "banned") {
        body.reason = reason || undefined;
      }

      try {
        await adminFetch(`/players/${activePlayerId}`, {
          method: "PATCH",
          body: JSON.stringify(body),
        });
        msgEl.className = "adm-formmsg ok";
        msgEl.textContent = "บันทึกแล้ว";
        msgEl.style.display = "block";
        await loadPlayers();
        const p = players.find((x) => x.id === activePlayerId);
        if (p) {
          document.getElementById("adminModalTitle").textContent = p.username;
        }
      } catch (err) {
        msgEl.className = "adm-formmsg error";
        msgEl.textContent = err.message;
        msgEl.style.display = "block";
      }
    });
  }

  // ---- History: unified "received items" timeline (rewards / claimed mail / shop) ----
  function historyTabHtml() {
    return `
      <div class="adm-section-title"><span class=gicon-note></span> ประวัติการรับของ (ล่าสุดก่อน)</div>
      <div class="adm-hint">รวมของรางวัลจากการผ่านด่าน/บอส, เมลที่กดรับแล้ว, และการซื้อจากร้านค้า</div>

  function historyTypeIcon(type) {
    return type === "reward" ? "<span class=gicon-battle></span>" : type === "mail" ? "<span class=gicon-mailbox></span>" : type === "shop" ? "<span class=gicon-store></span>" : "•";
  }

  // best-effort stringify for items_awarded (shape is a plain {bagKey: qty} object —
  // see STAGE_DROPS in public/js/core/drops.js — but kept defensive since the column
  // is untyped JSONB)
  function summarizeItems(items) {
    try {
      if (Array.isArray(items)) return items.map((it) => it.key || it.name || JSON.stringify(it)).join(", ");
      if (items && typeof items === "object") return Object.entries(items).map(([k, v]) => `${k} × ${v}`).join(", ");
    } catch {}
    return "";
  }

  function historyEventHtml(e) {
    const time = e.at ? new Date(e.at).toLocaleString("th-TH") : "-";
    const bits = [];
    if (e.money) bits.push(`<span class=gicon-coin></span> ${Number(e.money).toLocaleString()}`);
    if (e.bagKey && e.bagQty) bits.push(`${escapeHtml(e.bagKey)} × ${e.bagQty}`);
    if (e.card) bits.push(`<span class=gicon-user></span>‍<span class=gicon-handshake></span>‍<span class=gicon-user></span> ${escapeHtml(e.card.name)} (${escapeHtml(e.card.rarity)})`);
    if (e.equip) bits.push(`<span class=gicon-sword></span> ${escapeHtml(e.equip.name)} (${escapeHtml(e.equip.rarity)})`);
    if (e.items) { const s = summarizeItems(e.items); if (s) bits.push(`<span class=gicon-gift></span> ${s}`); }
    if (e.pricePaid !== undefined) {
      bits.push(e.paidWith === "shard" ? `จ่ายด้วย ${escapeHtml(e.shardKey || "")} × ${e.shardQty}` : `จ่าย <span class=gicon-coin></span> ${Number(e.pricePaid).toLocaleString()}`);
    }
    return `
      <div class="adm-timeline-item">
        <div class="adm-timeline-icon">${historyTypeIcon(e.type)}</div>
        <div class="adm-timeline-body">
          <div class="adm-timeline-top">
            <span class="adm-timeline-label">${escapeHtml(e.label)}</span>
            <span class="adm-timeline-time">${time}</span>
          </div>
          ${bits.length ? `<div class="adm-timeline-bits">${bits.join(" · ")}</div>` : ""}
        </div>
      </div>
    `;
  }

  async function loadHistoryInto(forPlayerId) {
    let events;
    try {
      events = await adminFetch(`/players/${forPlayerId}/history`);
    } catch (err) {
      if (activeTab === "history" && activePlayerId === forPlayerId) {
        const el = document.getElementById("historyList");
        if (el) el.innerHTML = `<p style="color:var(--bad)">โหลดไม่สำเร็จ: ${escapeHtml(err.message)}</p>`;
      }
      return;
    }
    if (!(activeTab === "history" && activePlayerId === forPlayerId)) return; // ผู้ใช้สลับแท็บ/บัญชีไปแล้วระหว่างรอโหลด
    const list = document.getElementById("historyList");
    if (!list) return;
    list.innerHTML = events.length
      ? events.map(historyEventHtml).join("")
      : `<p class="adm-mini-empty">ยังไม่มีประวัติการรับของ</p>`;
  }

  function bindReclaimTab() {

    kindSel.addEventListener("change", () => { fieldsEl.innerHTML = reclaimFieldsHtml(kindSel.value); });

      const note = document.getElementById("reclaimNote").value.trim();

      if (kind === "money") {
        body.amount = Number(document.getElementById("reclaimAmount").value);
      } else if (kind === "bag") {
        body.bagKey = document.getElementById("reclaimBagKey").value;
        body.amount = Number(document.getElementById("reclaimAmount").value);
      } else if (kind === "card") {
        body.cardName = document.getElementById("reclaimCardName").value;
        body.qty = Number(document.getElementById("reclaimQty").value);
      } else if (kind === "equip") {
        body.equipName = document.getElementById("reclaimEquipName").value;
        body.qty = Number(document.getElementById("reclaimQty").value);
      }

      const p = players.find((x) => x.id === activePlayerId);
      if (!(await uiConfirm(`ยืนยันเรียกคืนจากบัญชี "${p ? p.username : ""}"?`))) return;

          body: JSON.stringify(body),

        msgEl.className = "adm-formmsg ok";
        msgEl.textContent = reclaimResultMessage(result);
        msgEl.style.display = "block";

        // sync cached detail + table row so overview/list reflect the new balance right away
        if (activePlayerDetail) {

          activePlayerDetail.equipBag = result.equipBag;

    const time = r.createdAt ? new Date(r.createdAt).toLocaleString("th-TH") : "-";
    const tags = [];
    if (r.wentNegative) tags.push(`<span class="adm-tag bad">ติดลบ</span>`);
    if (r.convertedToMoney) tags.push(`<span class="adm-tag warn">หักเป็นเงิน ${Number(r.moneyDeducted).toLocaleString()}</span>`);
    return `
      <div class="adm-timeline-item">
        <div class="adm-timeline-icon">${reclaimKindIcon(r.kind)}</div>
        <div class="adm-timeline-body">
          <div class="adm-timeline-top">
            <span class="adm-timeline-label">${escapeHtml(r.label)}</span>
            <span class="adm-timeline-time">${time}</span>
          </div>
          ${tags.length ? `<div class="adm-timeline-bits">${tags.join(" ")}</div>` : ""}
          ${r.note ? `<div class="adm-timeline-bits muted">หมายเหตุ: ${escapeHtml(r.note)}</div>` : ""}
        </div>
      </div>
    `;
  }

  async function loadReclaimLogInto(forPlayerId) {
    let rows;
    try {
      rows = await adminFetch(`/players/${forPlayerId}/reclaims`);
    } catch (err) {
      if (activeTab === "reclaim" && activePlayerId === forPlayerId) {
        const el = document.getElementById("reclaimHistoryList");
        if (el) el.innerHTML = `<p style="color:var(--bad)">โหลดไม่สำเร็จ: ${escapeHtml(err.message)}</p>`;
      }
      return;
    }
    if (!(activeTab === "reclaim" && activePlayerId === forPlayerId)) return;
    const el = document.getElementById("reclaimHistoryList");
    if (!el) return;
    el.innerHTML = rows.length
      ? rows.map(reclaimLogItemHtml).join("")
      : `<p class="adm-mini-empty">ยังไม่เคยเรียกคืนอะไรจากบัญชีนี้</p>`;
  }

  // ---- Danger: delete ----
  function dangerTabHtml(p) {
    return `
      <p style="color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:16px">
        บัญชี "<strong>${escapeHtml(p.username)}</strong>" (${p.publicId}) จะถูกลบอย่างถาวร
        รวมถึงกล่องจดหมาย ประวัติการเล่น และทรัพยากรทั้งหมด การกระทำนี้ไม่สามารถย้อนกลับได้
      </p>
      <button id="deleteConfirmBtn" class="danger" style="width:100%">ลบบัญชีนี้ถาวร</button>
    `;
  }

  function bindDangerTab() {
    document.getElementById("deleteConfirmBtn").addEventListener("click", async () => {
      const p = players.find((x) => x.id === activePlayerId);
      if (!p) return;
      if (!(await uiConfirm(`ยืนยันลบบัญชี "${p.username}" ถาวร?`))) return;
      try {
        await adminFetch(`/players/${activePlayerId}`, { method: "DELETE" });
        closeModal();
        loadPlayers();
      } catch (err) {
        alert("ลบไม่สำเร็จ: " + err.message);
      }
    });
  }

  // boot
  if (getToken()) { showConsole(); } else { showGate(); }
</script>
</body>
</html>
