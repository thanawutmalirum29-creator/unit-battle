<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>🎰 กาชาอุปกรณ์</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0c121b" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <script src="../js/core/ui-scale.js"></script>
  <script src="../js/core/pwa-register.js" defer></script>
  <link rel="stylesheet" href="../css/theme.css" />
<link rel="stylesheet" href="../css/icons.css" />
  <script src="../js/core/ui-popup.js"></script>
  <style>
    /* ปุ่ม "ดูเรท" ในหัวตู้กาชาอุปกรณ์ — ให้หน้าตาเหมือน GACHA.html เป๊ะๆ */
    .gacha-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }
    .gacha-header button{
      width:26px;
      height:26px;
      min-width:26px;
      border-radius:50%;
      border:1.5px solid rgba(255,255,255,0.5);
      background:rgba(255,255,255,0.12);
      color:#fff;
      font-weight:800;
      font-size:14px;
      line-height:1;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:transform .12s ease, background .12s ease;
    }
    .gacha-header button:hover{
      background:rgba(255,255,255,0.25);
      transform:scale(1.1);
    }
    #ratePopup .rate-row{
      display:flex;
      justify-content:space-between;
      font-weight:700;
      margin-top:8px;
    }
    #ratePopup .char-grid{
      font-size:12px;
      opacity:.85;
      margin:2px 0 6px;
      line-height:1.5;
    }
    #ratePopup .char-grid > div:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body onload="renderEquipGachaBoxes()">
<header class="topbar">
  <h1>👔 กาชาอุปกรณ์</h1>
  <div class="right-group">
    <div id="moneyWindow"><span class=gicon-coin></span> 0</div>
  </div>
</header>
<div class="gacha-container"></div>

<div id="gachaOverlay">
  <button id="skipButton" class="hidden">⏩ Skip</button>
</div>

<!-- popup -->
<div id="ratePopup" class="popup hidden">
  <div class="popup-content">
    <h3>อัตราดรอปอุปกรณ์</h3>
    <div id="rateDetails"></div>
    <button onclick="closeEquipRatePopup()">ปิด</button>
  </div>
</div>

<script src="../js/core/money.js"></script>
<script src="../js/core/api.js"></script>
<script src="../js/core/auth-ui.js"></script>
<script src="../js/core/deck.js"></script>
<script src="../js/core/equipbag.js"></script>
<script src="../js/data/equip.js"></script>
<script src="../js/data/equip-gacha.js"></script>
<script src="../js/core/nav-fab.js"></script>
<script src="../js/core/mail-fab.js"></script>
</body>
</html>
