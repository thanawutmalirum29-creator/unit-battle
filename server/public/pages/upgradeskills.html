<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>Skill Upgrade</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0c121b" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<script src="../js/core/ui-scale.js"></script>
<script src="../js/core/scroll-lock.js"></script>
<script src="../js/core/pwa-register.js" defer></script>
<link rel="stylesheet" href="../css/theme.css" />
<link rel="stylesheet" href="../css/icons.css" />
<script src="../js/core/ui-popup.js"></script>
</head>
<body>
<header class="topbar">
  <button class="back-btn" onclick="goBack()"><span class=gicon-arrow-left></span> กลับ</button>
  <h1><span class="ico ico-power" aria-hidden="true"></span>อัปเกรดสกิล
    <span class="page-head-sub">ใช้ชาร์ดยกระดับพลังสกิลของการ์ด</span>
  </h1>
</header>
<div class="main-wrap">
  <div class="panel">
    <div class="panel-head">
      <h3>เลือกตัวละคร/การ์ด</h3>
      <span class="deck-count-badge" id="deckCount">0 ใบ</span>
    </div>
    <div id="deck-wrapper" class="upgrade-grid"></div>
  </div>

 <div class="panel skill-panel">
  <h3>รายละเอียดสกิล</h3>
  <div id="skillDetail">
    <p class="skill-empty-hint"><span class="ico ico-tap" aria-hidden="true"></span>แตะการ์ดด้านบนเพื่อดูรายละเอียดสกิลและอัปเกรด</p>
  </div>
</div>
</div>

<script src="../js/core/money.js"></script>
<script src="../js/core/api.js"></script>
<script src="../js/core/auth-ui.js"></script>
<script src="../js/core/deck.js"></script>
<script src="../js/core/bag.js"></script>
<script src="../js/shared/battle-math.js"></script>
<script src="../js/core/render.js"></script>
<script src="../js/data/upgradeSkills.js"></script>
<script src="../js/core/nav-fab.js"></script>

<script src="../js/core/account-panel.js"></script>
</body>
</html>
